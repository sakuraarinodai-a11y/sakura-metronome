<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サクラ整骨院 ステップ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080808;
    color: #fff;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .header-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #e8c4b8;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  #clock {
    font-size: 22px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: #aaa;
  }
  #btn-fullscreen {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #aaa;
    font-size: 18px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #btn-fullscreen:hover { background: #252525; }

  /* ===== MAIN ===== */
  main {
    display: grid;
    grid-template-columns: 580px 1fr;
    gap: 0;
    overflow: hidden;
  }

  /* --- Left panel --- */
  .tach-panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid #1a1a1a;
    background: #0b0b0b;
    padding: 10px 14px 10px 14px;
    gap: 6px;
    overflow: hidden;
  }

  /* Metronome (top, takes remaining space) */
  .metro-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 0;
  }

  /* HR horizontal bar area (bottom) */
  .hr-bar-h-area {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-top: 4px;
    border-top: 1px solid #1a1a1a;
  }
  .hr-h-info {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  #hr-value-display {
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .hr-bpm-unit {
    font-size: 18px;
    color: #555;
    letter-spacing: 0.08em;
  }
  #hr-zone-label {
    font-size: 22px;
    font-weight: 800;
    color: #555;
    letter-spacing: 0.05em;
  }
  #hr-bar-svg { display: block; width: 100%; }
  #metro-svg {
    width: 100%;
    height: 100%;
    max-width: 460px;
    display: block;
  }

  /* Pendulum animation (controlled by Web Animations API) */
  #pendulum-group {
    transform-box: fill-box;
    transform-origin: 50% 0%;
  }

  /* --- Right panel --- */
  .step-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 32px;
    gap: 18px;
    background: #0d0d0d;
  }

  #preset-name {
    font-size: 22px;
    font-weight: 600;
    color: #aaa;
    letter-spacing: 0.06em;
    min-height: 30px;
  }

  .bpm-display-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  #bpm-value {
    font-size: 120px;
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: #fff;
    transition: opacity 0.04s;
    letter-spacing: -4px;
  }
  #bpm-value.flash { color: #e8c4b8; }
  #bpm-label {
    font-size: 20px;
    color: #555;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Beat dots */
  .beat-dots {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .beat-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #1e1e1e;
    border: 2px solid #333;
    transition: background 0.08s, box-shadow 0.08s;
  }
  .beat-dot.beat-dot--accent { border-color: #e8c4b8; }
  .beat-dot.beat-dot--accent.active {
    background: #e8c4b8;
    box-shadow: 0 0 14px #e8c4b855;
  }
  .beat-dot.active {
    background: #22C55E;
    box-shadow: 0 0 12px #22C55E66;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    max-width: 440px;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .progress-bar-bg {
    width: 100%;
    height: 10px;
    background: #1e1e1e;
    border-radius: 5px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #0284C7, #22C55E, #D97706);
    border-radius: 5px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Done screen */
  #done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: center;
  }
  #done-screen.visible { display: flex; }
  .step-panel-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; width: 100%; }
  .step-panel-inner.hidden { display: none; }
  .done-title { font-size: 36px; font-weight: 800; color: #22C55E; letter-spacing: 0.05em; }
  .done-stat { font-size: 18px; color: #aaa; }
  .done-stat span { color: #fff; font-weight: 700; font-size: 22px; }
  #btn-retry {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    font-size: 18px;
    padding: 12px 36px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  #btn-retry:hover { background: #252525; }

  /* ===== AGE CONTROL ===== */
  .age-ctrl {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .age-left {
    display: flex;
    align-items: baseline;
    gap: 5px;
    flex-shrink: 0;
  }
  .age-num  { font-size: 22px; font-weight: 900; color: #fff; line-height: 1; }
  .age-unit { font-size: 13px; color: #555; }
  .mhr-text { font-size: 12px; color: #555; white-space: nowrap; }
  .age-slider-wrap { width: 180px; }
  input[type=range] {
    width: 100%; height: 6px;
    -webkit-appearance: none; appearance: none;
    background: #2a2a2a; border-radius: 3px; outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: #e8c4b8; border-radius: 50%; cursor: pointer;
  }
  .age-range-lbl {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #333; margin-top: 3px;
  }

  /* ===== FOOTER ===== */
  footer {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    border-top: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .footer-btn {
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #ccc;
    font-size: 15px;
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .footer-btn:hover { background: #202020; }
  .footer-btn.selected { background: #1a2e3a; border-color: #0284C7; color: #38BDF8; }
  .footer-btn.ok { background: #0f2a1a; border-color: #16A34A; color: #4ADE80; }
  .footer-btn:disabled { opacity: 0.38; cursor: not-allowed; }
  .footer-spacer { flex: 1; }
  #btn-start {
    background: #14532d;
    border-color: #16A34A;
    color: #4ADE80;
    font-size: 17px;
    padding: 10px 34px;
  }
  #btn-start:hover:not(:disabled) { background: #166534; }
  #btn-start.stop { background: #4a0e0e; border-color: #DC2626; color: #F87171; }
  #btn-start.stop:hover { background: #5a1010; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 767px) {
    /* Header */
    header { padding: 8px 14px; }
    .header-title { font-size: 15px; }
    #clock { font-size: 15px; }
    #btn-fullscreen { font-size: 15px; padding: 5px 8px; }

    /* Main: 縦1列に */
    main {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }

    /* Left panel */
    .tach-panel {
      border-right: none;
      border-bottom: 1px solid #1a1a1a;
      padding: 6px 10px 6px;
      gap: 4px;
    }
    .metro-wrap {
      height: 190px;
      flex: none;
    }
    #metro-svg { max-width: 220px; }

    /* HR bar */
    #hr-value-display { font-size: 38px; }
    .hr-bpm-unit { font-size: 13px; }
    #hr-zone-label { font-size: 16px; }

    /* Step panel */
    .step-panel { padding: 10px 16px; gap: 8px; }
    #preset-name { font-size: 15px; min-height: 22px; }
    #bpm-value { font-size: 80px; letter-spacing: -2px; }
    #bpm-label { font-size: 15px; }
    .beat-dot { width: 16px; height: 16px; }
    .beat-dots { gap: 6px; }
    .progress-labels { font-size: 12px; }

    /* Done screen */
    .done-title { font-size: 28px; }
    .done-stat  { font-size: 15px; }

    /* Footer: 2行グリッド */
    footer {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      grid-template-rows: auto auto;
      gap: 6px 8px;
      padding: 8px 12px;
    }
    #btn-preset-0 { grid-column: 1; grid-row: 1; padding: 9px 8px; font-size: 13px; }
    #btn-preset-1 { grid-column: 2; grid-row: 1; padding: 9px 8px; font-size: 13px; }
    #btn-bt       { grid-column: 3; grid-row: 1; padding: 9px 10px; font-size: 13px; }
    #btn-start    { grid-column: 4; grid-row: 1; padding: 9px 16px; font-size: 15px; }
    .footer-spacer { display: none; }
    .age-ctrl {
      grid-column: 1 / -1;
      grid-row: 2;
      width: 100%;
      gap: 10px;
    }
    .age-slider-wrap { flex: 1; width: auto; }
    .age-num  { font-size: 18px; }
    .mhr-text { font-size: 11px; }

    /* タッチ操作改善 */
    input[type=range] { touch-action: manipulation; }
    .footer-btn { touch-action: manipulation; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">サクラ整骨院 ステップ</div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <button id="btn-fullscreen" title="全画面">⛶</button>
  </div>
</header>

<!-- MAIN -->
<main>
  <!-- Left Panel -->
  <div class="tach-panel">

    <!-- Metronome SVG (top) -->
    <div class="metro-wrap">
      <svg id="metro-svg" viewBox="0 0 380 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="st-face" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#8a6020"/>
            <stop offset="25%"  stop-color="#c8a050"/>
            <stop offset="50%"  stop-color="#d8b868"/>
            <stop offset="75%"  stop-color="#c8a050"/>
            <stop offset="100%" stop-color="#8a6020"/>
          </linearGradient>
          <linearGradient id="st-slot" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#2a1206"/>
            <stop offset="100%" stop-color="#060302"/>
          </linearGradient>
          <linearGradient id="st-wt" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#fff080"/>
            <stop offset="40%"  stop-color="#f4b020"/>
            <stop offset="100%" stop-color="#b87010"/>
          </linearGradient>
          <filter id="st-nglow" x="-80%" y="-5%" width="260%" height="110%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- 3D sides -->
        <polygon points="92,62 37,394 30,400 85,66"    fill="#6a4010"/>
        <polygon points="288,62 343,394 350,400 295,66" fill="#5a3408"/>
        <polygon points="37,394 343,394 350,400 30,400" fill="#3a2006"/>

        <!-- Main body face -->
        <polygon points="92,62 288,62 343,394 37,394" fill="url(#st-face)"/>
        <polygon points="92,62 288,62 343,394 37,394" fill="none" stroke="#2e1404" stroke-width="2"/>

        <!-- Scale marks — left of slot -->
        <line x1="168" y1="90"  x2="84"  y2="90"  stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="110" x2="92"  y2="110" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="168" y1="130" x2="80"  y2="130" stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="150" x2="88"  y2="150" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="168" y1="170" x2="74"  y2="170" stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="190" x2="82"  y2="190" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="168" y1="210" x2="68"  y2="210" stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="230" x2="76"  y2="230" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="168" y1="250" x2="62"  y2="250" stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="270" x2="70"  y2="270" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="168" y1="290" x2="56"  y2="290" stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="310" x2="64"  y2="310" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="168" y1="330" x2="50"  y2="330" stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="350" x2="58"  y2="350" stroke="#6a4818" stroke-width="1.2"/>

        <!-- Scale marks — right of slot -->
        <line x1="212" y1="90"  x2="296" y2="90"  stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="110" x2="288" y2="110" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="212" y1="130" x2="300" y2="130" stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="150" x2="292" y2="150" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="212" y1="170" x2="306" y2="170" stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="190" x2="298" y2="190" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="212" y1="210" x2="312" y2="210" stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="230" x2="304" y2="230" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="212" y1="250" x2="318" y2="250" stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="270" x2="310" y2="270" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="212" y1="290" x2="324" y2="290" stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="310" x2="316" y2="310" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="212" y1="330" x2="330" y2="330" stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="350" x2="322" y2="350" stroke="#6a4818" stroke-width="1.2"/>

        <!-- BPM label -->
        <text x="190" y="52" text-anchor="middle" font-size="13" fill="#7a5010"
              font-family="'Helvetica Neue',Arial,sans-serif"
              letter-spacing="0.14em" font-weight="700">BPM</text>

        <!-- Central slot (dark arch) -->
        <path d="M 170,80 A 20,20 0 0,0 210,80 L 210,392 L 170,392 Z"
              fill="url(#st-slot)"/>
        <line x1="170" y1="80" x2="170" y2="392" stroke="#1a0c04" stroke-width="1.5"/>
        <line x1="210" y1="80" x2="210" y2="392" stroke="#1a0c04" stroke-width="1.5"/>

        <!-- Pendulum group (pivot = 190,58 — everything hangs down, transform-origin: 50% 0% works) -->
        <g transform="translate(190,58)">
          <g id="pendulum-group">
            <!-- Needle shaft -->
            <rect x="-3" y="0" width="6" height="316" rx="3"
                  fill="#eae6da" filter="url(#st-nglow)"/>
            <!-- Weight (yellow teardrop) -->
            <path d="M 0,82 C 26,82 28,114 0,140 C -26,114 -24,82 0,82"
                  fill="url(#st-wt)"/>
            <!-- Weight shine -->
            <ellipse cx="-7" cy="94" rx="8" ry="11"
                     fill="rgba(255,255,220,0.42)" transform="rotate(-10,-7,94)"/>
            <!-- Tail detail -->
            <rect x="-5" y="314" width="10" height="18" rx="5" fill="#c09840"/>
          </g>
        </g>

        <!-- Pivot pin -->
        <circle cx="190" cy="58" r="11"  fill="#221004" stroke="#c09030" stroke-width="2"/>
        <circle cx="190" cy="58" r="5"   fill="#e8b838"/>
        <circle cx="190" cy="58" r="2"   fill="#fff8e0"/>

        <!-- Base pill -->
        <rect x="50" y="397" width="280" height="34" rx="17"
              fill="#160c06" stroke="#2a1808" stroke-width="1.5"/>
        <circle cx="190" cy="414" r="10"  fill="#241008" stroke="#3a2010" stroke-width="1.5"/>
        <circle cx="190" cy="414" r="4.5" fill="#3a2010"/>
      </svg>
    </div>

    <!-- HR horizontal bar (bottom) -->
    <div class="hr-bar-h-area">
      <div class="hr-h-info">
        <span id="hr-value-display">--</span>
        <span class="hr-bpm-unit">bpm</span>
        <span id="hr-zone-label">---</span>
      </div>
      <svg id="hr-bar-svg" viewBox="0 0 530 72" preserveAspectRatio="xMidYMid meet">
        <g id="hr-zone-bars"></g>
        <g id="hr-ticks"></g>
        <!-- ポインター（心拍数位置インジケーター） -->
        <g id="hr-pointer-group" opacity="0">
          <line x1="0" y1="14" x2="0" y2="52" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <polygon points="-8,52 8,52 0,64" fill="white"/>
        </g>
      </svg>
    </div>

  </div>

  <!-- Right Panel -->
  <div class="step-panel">
    <div class="step-panel-inner" id="main-panel">
      <div id="preset-name">プリセットを選択してください</div>

      <div class="bpm-display-wrap">
        <div id="bpm-value">--</div>
        <div id="bpm-label">BPM</div>
      </div>

      <div class="beat-dots" id="beat-dots"></div>

      <div class="progress-wrap">
        <div class="progress-labels">
          <span id="prog-start">--</span>
          <span id="prog-current">-- BPM</span>
          <span id="prog-end">--</span>
        </div>
        <div class="progress-bar-bg">
          <div id="progress-bar-fill"></div>
        </div>
      </div>
    </div>

    <div id="done-screen">
      <div class="done-title">完了！</div>
      <div class="done-stat">最終 BPM: <span id="done-bpm">--</span></div>
      <div class="done-stat">総ステップ数: <span id="done-steps">--</span></div>
      <button class="footer-btn" id="btn-retry">もう一度</button>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <button class="footer-btn" id="btn-preset-0">ウォーキング1</button>
  <button class="footer-btn" id="btn-preset-1">ウォーキング2</button>
  <div class="footer-spacer"></div>
  <!-- 年齢スライダー -->
  <div class="age-ctrl">
    <div class="age-left">
      <span class="age-num" id="age-disp">40</span>
      <span class="age-unit">歳</span>
      <span class="mhr-text" id="mhr-disp">最大 180 bpm</span>
    </div>
    <div class="age-slider-wrap">
      <input type="range" id="age-slider" min="10" max="90" value="40" oninput="onAge(this.value)">
      <div class="age-range-lbl"><span>10歳</span><span>90歳</span></div>
    </div>
  </div>
  <div class="footer-spacer"></div>
  <button class="footer-btn" id="btn-bt">🔵 Bluetooth</button>
  <button class="footer-btn" id="btn-start" disabled>開始</button>
</footer>

<script>
// ===== CONSTANTS =====
const ZONES = [
  { min: 0,    max: 0.50, color: '#555555', label: '安静' },
  { min: 0.50, max: 0.60, color: '#0284C7', label: 'リハビリ' },
  { min: 0.60, max: 0.70, color: '#16A34A', label: '有酸素運動' },
  { min: 0.70, max: 0.85, color: '#D97706', label: 'トレーニング' },
  { min: 0.85, max: 1.00, color: '#DC2626', label: 'アスリート' },
];

const PRESETS = [
  { name: 'ウォーキング1', start: 75, end: 105 },
  { name: 'ウォーキング2', start: 85, end: 115 },
];
const BEATS_PER_LEVEL = 10;

// ===== STATE =====
const S = {
  running: false,
  selectedPreset: null,
  bpm: 0,
  beatInLevel: 0,
  totalBeats: 0,
  nextBeatTime: 0,
  timer: null,
  hr: 0,
  peakHR: 0,
  age: 40,
  maxHR: 180,
  btDevice: null,
};

// ===== AUDIO =====
let _audioCtx = null;

function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playTone(freq, dur, vol = 0.4, type = 'sine') {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (_) {}
}

// ===== AGE / MAX HR =====
function onAge(v) {
  S.age   = parseInt(v);
  S.maxHR = 220 - S.age;
  document.getElementById('age-disp').textContent = S.age;
  document.getElementById('mhr-disp').textContent = `最大 ${S.maxHR} bpm`;
  buildHRBar(S.maxHR);
  if (S.hr > 0) updateHRBar(S.hr, S.maxHR);
  try { localStorage.setItem('sakura_step_age', S.age); } catch (_) {}
}

// ===== HR BAR GAUGE (horizontal) =====
// SVG viewBox: 0 0 530 72
const H_BAR_X = 0;
const H_BAR_Y = 20;  // BPMラベル下
const H_BAR_W = 530;
const H_BAR_H = 34;

function buildHRBar(maxHR) {
  const gZones = document.getElementById('hr-zone-bars');
  const gTicks = document.getElementById('hr-ticks');
  gZones.innerHTML = '';
  gTicks.innerHTML = '';

  // ゾーン矩形（左が低心拍・右が高心拍）
  ZONES.forEach(zone => {
    const x = H_BAR_X + H_BAR_W * zone.min;
    const w = H_BAR_W * (zone.max - zone.min);
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x);
    rect.setAttribute('y', H_BAR_Y);
    rect.setAttribute('width', Math.max(1, w));
    rect.setAttribute('height', H_BAR_H);
    rect.setAttribute('fill', zone.color);
    rect.setAttribute('opacity', '0.55');
    rect.setAttribute('id', 'zone-bar-' + zone.label);
    gZones.appendChild(rect);
  });

  // BPMラベル + 境界縦線（年齢連動）
  [0.50, 0.60, 0.70, 0.85, 1.00].forEach(t => {
    const x   = H_BAR_X + H_BAR_W * t;
    const bpm = Math.round(maxHR * t);
    const anchor = t === 1.00 ? 'end' : 'middle';

    // 境界縦線（端以外）
    if (t > 0 && t < 1.00) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x); line.setAttribute('y1', H_BAR_Y);
      line.setAttribute('x2', x); line.setAttribute('y2', H_BAR_Y + H_BAR_H);
      line.setAttribute('stroke', '#111');
      line.setAttribute('stroke-width', '2');
      gTicks.appendChild(line);
    }

    // BPMラベル（バー上部）
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', x);
    txt.setAttribute('y', H_BAR_Y - 5);
    txt.setAttribute('text-anchor', anchor);
    txt.setAttribute('font-size', '14');
    txt.setAttribute('font-weight', '600');
    txt.setAttribute('fill', '#888');
    txt.setAttribute('font-family', "'Helvetica Neue',Arial,sans-serif");
    txt.setAttribute('font-variant-numeric', 'tabular-nums');
    txt.textContent = bpm;
    gTicks.appendChild(txt);
  });
}

function updateHRBar(hr, maxHR) {
  const ratio = Math.min(1, Math.max(0, hr / maxHR));
  const x     = H_BAR_X + H_BAR_W * ratio;

  // ポインター（縦線＋三角形）を移動
  const pg = document.getElementById('hr-pointer-group');
  pg.setAttribute('opacity', '1');
  pg.setAttribute('transform', `translate(${x}, 0)`);

  // ゾーンハイライト
  let currentZone = ZONES[0];
  ZONES.forEach(zone => {
    const el = document.getElementById('zone-bar-' + zone.label);
    if (ratio >= zone.min && ratio < zone.max) {
      currentZone = zone;
      if (el) el.setAttribute('opacity', '1');
    } else {
      if (el) el.setAttribute('opacity', '0.2');
    }
  });

  document.getElementById('hr-value-display').textContent = hr;
  const zLabel = document.getElementById('hr-zone-label');
  zLabel.textContent = currentZone.label;
  zLabel.style.color = currentZone.color;
}

// ===== METRONOME ANIMATION =====
// ビートごとに方向を明示指定して alternate に依存しない
let _pendulumAnim  = null;
let _pendulumAngle = -26; // 現在の停止角度
let _pendulumDir   = 1;   // 次に向かう方向 (+1=右, -1=左)

function swingPendulum(bpm) {
  if (bpm <= 0) return;
  const group      = document.getElementById('pendulum-group');
  const durationMs = (60 / bpm) * 1000;

  const from = _pendulumAngle;
  _pendulumDir  *= -1;
  const to       = 26 * _pendulumDir;
  _pendulumAngle = to;

  if (_pendulumAnim) _pendulumAnim.cancel();
  _pendulumAnim = group.animate(
    [
      { transform: `rotate(${from}deg)` },
      { transform: `rotate(${to}deg)` },
    ],
    {
      duration: durationMs,
      easing: 'cubic-bezier(0.45, 0.05, 0.55, 0.95)',
      fill: 'forwards',
    }
  );
}

// ===== BEAT DOTS =====
function buildBeatDots() {
  const container = document.getElementById('beat-dots');
  container.innerHTML = '';
  for (let i = 0; i < BEATS_PER_LEVEL; i++) {
    const dot = document.createElement('div');
    dot.className = 'beat-dot' + (i === 0 ? ' beat-dot--accent' : '');
    dot.id = 'dot-' + i;
    container.appendChild(dot);
  }
}

function updateBeatDots(beatIndex) {
  for (let i = 0; i < BEATS_PER_LEVEL; i++) {
    const dot = document.getElementById('dot-' + i);
    if (!dot) continue;
    dot.classList.toggle('active', i < beatIndex);
  }
}

// ===== PROGRESS BAR =====
function updateProgress() {
  if (!S.selectedPreset) return;
  const preset = PRESETS[S.selectedPreset];
  const range = preset.end - preset.start;
  const current = S.running ? S.bpm : preset.start;
  const ratio = range > 0 ? (current - preset.start) / range : 0;
  const pct = Math.max(0, Math.min(100, ratio * 100));
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('prog-start').textContent = preset.start;
  document.getElementById('prog-current').textContent = current + ' BPM';
  document.getElementById('prog-end').textContent = preset.end;
}

// ===== BPM FLASH =====
let _flashTimer = null;
function flashBPM() {
  const el = document.getElementById('bpm-value');
  el.classList.add('flash');
  if (_flashTimer) clearTimeout(_flashTimer);
  _flashTimer = setTimeout(() => el.classList.remove('flash'), 80);
}

// ===== METRONOME ENGINE =====
function onBeat() {
  S.beatInLevel++;
  S.totalBeats++;

  swingPendulum(S.bpm); // ビートのたびに方向を明示して振り子を動かす

  const isAccent  = (S.beatInLevel === 1);
  const isLevelUp = (S.beatInLevel > BEATS_PER_LEVEL);

  if (isLevelUp) {
    S.bpm++;
    S.beatInLevel = 1;
    const preset = PRESETS[S.selectedPreset];

    if (S.bpm > preset.end) {
      stopMetronome(true);
      return;
    }

    playTone(660, 0.18, 0.45, 'square');
    flashBPM();
    document.getElementById('bpm-value').textContent = S.bpm;
    updateProgress();
    updateBeatDots(1);
  } else {
    if (isAccent) {
      playTone(1200, 0.07, 0.5, 'sine');
    } else {
      playTone(880, 0.05, 0.3, 'sine');
    }
    flashBPM();
    updateBeatDots(S.beatInLevel);
  }
}

function tick() {
  if (!S.running) return;
  if (Date.now() >= S.nextBeatTime - 5) {
    onBeat();
    S.nextBeatTime += 60000 / S.bpm;
  }
  S.timer = setTimeout(tick, Math.max(1, Math.min(S.nextBeatTime - Date.now(), 16)));
}

function startMetronome() {
  if (S.selectedPreset === null) return;
  const preset = PRESETS[S.selectedPreset];
  S.bpm = preset.start;
  S.beatInLevel = 0;
  S.totalBeats = 0;
  S.running = true;
  S.nextBeatTime = Date.now();

  document.getElementById('bpm-value').textContent = S.bpm;
  document.getElementById('prog-start').textContent = preset.start;
  document.getElementById('prog-end').textContent = preset.end;
  document.getElementById('btn-start').textContent = '停止';
  document.getElementById('btn-start').classList.add('stop');
  updateBeatDots(0);
  updateProgress();
  tick();
}

function stopMetronome(completed) {
  S.running = false;
  clearTimeout(S.timer);
  S.timer = null;

  if (completed) {
    showDoneScreen();
  } else {
    document.getElementById('btn-start').textContent = '開始';
    document.getElementById('btn-start').classList.remove('stop');
    document.getElementById('bpm-value').textContent = S.selectedPreset !== null ? PRESETS[S.selectedPreset].start : '--';
    updateBeatDots(0);
    updateProgress();
  }
}

function showDoneScreen() {
  document.getElementById('main-panel').classList.add('hidden');
  document.getElementById('done-screen').classList.add('visible');
  document.getElementById('done-bpm').textContent = S.bpm;
  document.getElementById('done-steps').textContent = S.totalBeats.toLocaleString();
  document.getElementById('btn-start').textContent = '開始';
  document.getElementById('btn-start').classList.remove('stop');
  document.getElementById('btn-start').disabled = true;
  playTone(880, 0.3, 0.5);
  setTimeout(() => playTone(1100, 0.3, 0.5), 320);
  setTimeout(() => playTone(1320, 0.5, 0.5), 640);
}

function hideDoneScreen() {
  document.getElementById('main-panel').classList.remove('hidden');
  document.getElementById('done-screen').classList.remove('visible');
  if (S.selectedPreset !== null) {
    document.getElementById('btn-start').disabled = false;
  }
}

// ===== BLUETOOTH =====
async function connectBT() {
  if (S.btDevice) {
    try { S.btDevice.gatt.disconnect(); } catch (_) {}
    S.btDevice = null;
    document.getElementById('btn-bt').textContent = '🔵 Bluetooth';
    document.getElementById('btn-bt').classList.remove('ok');
    return;
  }
  try {
    const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
    dev.addEventListener('gattserverdisconnected', () => {
      S.btDevice = null;
      document.getElementById('btn-bt').textContent = '🔵 Bluetooth';
      document.getElementById('btn-bt').classList.remove('ok');
    });
    const server = await dev.gatt.connect();
    const svc = await server.getPrimaryService('heart_rate');
    const chr = await svc.getCharacteristic('heart_rate_measurement');
    await chr.startNotifications();
    chr.addEventListener('characteristicvaluechanged', onHR);
    S.btDevice = dev;
    document.getElementById('btn-bt').textContent = '💚 接続済み';
    document.getElementById('btn-bt').classList.add('ok');
  } catch (e) {
    if (e.name !== 'NotFoundError') alert('Bluetooth接続エラー: ' + e.message);
  }
}

function onHR(e) {
  const v = e.target.value;
  const fl = v.getUint8(0);
  const hr = (fl & 0x01) ? v.getUint16(1, true) : v.getUint8(1);
  S.hr = hr;
  if (hr > S.peakHR) S.peakHR = hr;
  updateHRBar(hr, S.maxHR);
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  const h   = String(now.getHours()).padStart(2, '0');
  const m   = String(now.getMinutes()).padStart(2, '0');
  const sec = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}:${sec}`;
}

// ===== INIT =====
function init() {
  // 年齢をLocalStorageから復元して初期化（buildHRBar()もonAge内で呼ばれる）
  let initAge = 40;
  try { const s = localStorage.getItem('sakura_step_age'); if (s) initAge = parseInt(s); } catch (_) {}
  document.getElementById('age-slider').value = initAge;
  onAge(initAge);

  buildBeatDots();
  updateClock();
  setInterval(updateClock, 1000);
  swingPendulum(75); // 起動時に振り子を初期位置へ

  PRESETS.forEach((preset, idx) => {
    const btn = document.getElementById('btn-preset-' + idx);
    btn.addEventListener('click', () => {
      if (S.running) stopMetronome(false);
      S.selectedPreset = idx;
      document.getElementById('preset-name').textContent = preset.name;
      document.getElementById('bpm-value').textContent = preset.start;
      document.getElementById('prog-start').textContent = preset.start;
      document.getElementById('prog-current').textContent = preset.start + ' BPM';
      document.getElementById('prog-end').textContent = preset.end;
      document.getElementById('progress-bar-fill').style.width = '0%';
      document.getElementById('btn-start').disabled = false;
      updateBeatDots(0);
      hideDoneScreen();
      document.querySelectorAll('[id^="btn-preset-"]').forEach((b, i) => {
        b.classList.toggle('selected', i === idx);
      });
    });
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    getAudioCtx();
    if (S.running) {
      stopMetronome(false);
    } else {
      startMetronome();
    }
  });

  document.getElementById('btn-bt').addEventListener('click', connectBT);

  document.getElementById('btn-retry').addEventListener('click', () => {
    hideDoneScreen();
    document.getElementById('bpm-value').textContent = PRESETS[S.selectedPreset].start;
    updateBeatDots(0);
    updateProgress();
  });

  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
