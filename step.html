<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サクラ整骨院 ステップ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080808;
    color: #fff;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .header-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #e8c4b8;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  #clock {
    font-size: 22px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: #aaa;
  }
  #btn-fullscreen {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #aaa;
    font-size: 18px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #btn-fullscreen:hover { background: #252525; }

  /* ===== MAIN ===== */
  main {
    display: grid;
    grid-template-columns: 580px 1fr;
    gap: 0;
    overflow: hidden;
  }

  /* --- Left panel --- */
  .tach-panel {
    display: flex;
    align-items: stretch;
    border-right: 1px solid #1a1a1a;
    background: #0b0b0b;
    padding: 12px 8px 12px 12px;
    gap: 8px;
    overflow: hidden;
  }

  /* HR vertical bar */
  .hr-gauge-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    flex-shrink: 0;
    width: 120px;
  }
  #hr-value-display {
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    text-align: center;
    min-width: 80px;
  }
  .hr-bpm-unit {
    font-size: 12px;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: -4px;
  }
  #hr-bar-svg { display: block; }
  #hr-zone-label {
    font-size: 12px;
    font-weight: 700;
    color: #666;
    text-align: center;
    min-height: 18px;
    letter-spacing: 0.04em;
  }

  /* Metronome */
  .metro-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-width: 0;
  }
  #metro-svg {
    width: 100%;
    height: 100%;
    max-width: 460px;
    display: block;
  }

  /* Pendulum animation (controlled by Web Animations API) */
  #pendulum-group {
    transform-box: fill-box;
    transform-origin: 50% 0%;
  }

  /* --- Right panel --- */
  .step-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 32px;
    gap: 18px;
    background: #0d0d0d;
  }

  #preset-name {
    font-size: 22px;
    font-weight: 600;
    color: #aaa;
    letter-spacing: 0.06em;
    min-height: 30px;
  }

  .bpm-display-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  #bpm-value {
    font-size: 120px;
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: #fff;
    transition: opacity 0.04s;
    letter-spacing: -4px;
  }
  #bpm-value.flash { color: #e8c4b8; }
  #bpm-label {
    font-size: 20px;
    color: #555;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Beat dots */
  .beat-dots {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .beat-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #1e1e1e;
    border: 2px solid #333;
    transition: background 0.08s, box-shadow 0.08s;
  }
  .beat-dot.beat-dot--accent { border-color: #e8c4b8; }
  .beat-dot.beat-dot--accent.active {
    background: #e8c4b8;
    box-shadow: 0 0 14px #e8c4b855;
  }
  .beat-dot.active {
    background: #22C55E;
    box-shadow: 0 0 12px #22C55E66;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    max-width: 440px;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .progress-bar-bg {
    width: 100%;
    height: 10px;
    background: #1e1e1e;
    border-radius: 5px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #0284C7, #22C55E, #D97706);
    border-radius: 5px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Done screen */
  #done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: center;
  }
  #done-screen.visible { display: flex; }
  .step-panel-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; width: 100%; }
  .step-panel-inner.hidden { display: none; }
  .done-title { font-size: 36px; font-weight: 800; color: #22C55E; letter-spacing: 0.05em; }
  .done-stat { font-size: 18px; color: #aaa; }
  .done-stat span { color: #fff; font-weight: 700; font-size: 22px; }
  #btn-retry {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    font-size: 18px;
    padding: 12px 36px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  #btn-retry:hover { background: #252525; }

  /* ===== AGE CONTROL ===== */
  .age-ctrl {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .age-left {
    display: flex;
    align-items: baseline;
    gap: 5px;
    flex-shrink: 0;
  }
  .age-num  { font-size: 22px; font-weight: 900; color: #fff; line-height: 1; }
  .age-unit { font-size: 13px; color: #555; }
  .mhr-text { font-size: 12px; color: #555; white-space: nowrap; }
  .age-slider-wrap { width: 180px; }
  input[type=range] {
    width: 100%; height: 6px;
    -webkit-appearance: none; appearance: none;
    background: #2a2a2a; border-radius: 3px; outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: #e8c4b8; border-radius: 50%; cursor: pointer;
  }
  .age-range-lbl {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #333; margin-top: 3px;
  }

  /* ===== FOOTER ===== */
  footer {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    border-top: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .footer-btn {
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #ccc;
    font-size: 15px;
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .footer-btn:hover { background: #202020; }
  .footer-btn.selected { background: #1a2e3a; border-color: #0284C7; color: #38BDF8; }
  .footer-btn.ok { background: #0f2a1a; border-color: #16A34A; color: #4ADE80; }
  .footer-btn:disabled { opacity: 0.38; cursor: not-allowed; }
  .footer-spacer { flex: 1; }
  #btn-start {
    background: #14532d;
    border-color: #16A34A;
    color: #4ADE80;
    font-size: 17px;
    padding: 10px 34px;
  }
  #btn-start:hover:not(:disabled) { background: #166534; }
  #btn-start.stop { background: #4a0e0e; border-color: #DC2626; color: #F87171; }
  #btn-start.stop:hover { background: #5a1010; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">サクラ整骨院 ステップ</div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <button id="btn-fullscreen" title="全画面">⛶</button>
  </div>
</header>

<!-- MAIN -->
<main>
  <!-- Left Panel -->
  <div class="tach-panel">

    <!-- HR vertical bar -->
    <div class="hr-gauge-wrap">
      <div id="hr-value-display">--</div>
      <div class="hr-bpm-unit">bpm</div>
      <svg id="hr-bar-svg" viewBox="0 0 108 360" width="108" height="360">
        <g id="hr-zone-bars"></g>
        <rect id="hr-indicator" x="2" y="338" width="76" height="4" fill="white" rx="2" opacity="0"/>
        <g id="hr-ticks"></g>
      </svg>
      <div id="hr-zone-label">---</div>
    </div>

    <!-- Metronome SVG -->
    <div class="metro-wrap">
      <svg id="metro-svg" viewBox="0 0 380 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <!-- 台座 -->
        <polygon points="60,465 320,465 345,390 35,390" fill="#141414" stroke="#282828" stroke-width="1.5"/>
        <!-- 台座内飾り -->
        <line x1="80" y1="412" x2="300" y2="412" stroke="#222" stroke-width="1"/>
        <text x="190" y="452" text-anchor="middle" font-size="12" fill="#2a2a2a"
              font-family="'Helvetica Neue',Arial,sans-serif" letter-spacing="4" font-weight="600">SAKURA</text>
        <!-- 本体（台形） -->
        <polygon points="100,55 280,55 340,390 40,390" fill="#181818" stroke="#262626" stroke-width="1.5"/>
        <!-- 本体内の縦線装飾 -->
        <line x1="190" y1="70" x2="190" y2="380" stroke="#1e1e1e" stroke-width="1.5"/>
        <!-- 目盛り（左） -->
        <line x1="98" y1="120" x2="120" y2="126" stroke="#2a2a2a" stroke-width="1.2"/>
        <line x1="88"  y1="165" x2="114" y2="168" stroke="#2a2a2a" stroke-width="1.2"/>
        <line x1="80"  y1="210" x2="110" y2="210" stroke="#333"    stroke-width="1.5"/>
        <line x1="80"  y1="255" x2="110" y2="252" stroke="#2a2a2a" stroke-width="1.2"/>
        <line x1="82"  y1="300" x2="112" y2="294" stroke="#2a2a2a" stroke-width="1.2"/>
        <!-- 目盛り（右） -->
        <line x1="282" y1="120" x2="260" y2="126" stroke="#2a2a2a" stroke-width="1.2"/>
        <line x1="292" y1="165" x2="266" y2="168" stroke="#2a2a2a" stroke-width="1.2"/>
        <line x1="300" y1="210" x2="270" y2="210" stroke="#333"    stroke-width="1.5"/>
        <line x1="298" y1="255" x2="270" y2="252" stroke="#2a2a2a" stroke-width="1.2"/>
        <line x1="298" y1="300" x2="268" y2="294" stroke="#2a2a2a" stroke-width="1.2"/>
        <!-- 支点ピン -->
        <circle cx="190" cy="58" r="10" fill="#222" stroke="#3a3a3a" stroke-width="2"/>
        <circle cx="190" cy="58" r="4"  fill="#444"/>
        <!-- 振り子（支点(190,58)に平行移動してからrotate） -->
        <g transform="translate(190,58)">
          <g id="pendulum-group">
            <!-- 棒 -->
            <line x1="0" y1="0" x2="0" y2="320" stroke="#c0c0c0" stroke-width="5" stroke-linecap="round"/>
            <!-- 棒の光沢 -->
            <line x1="-1" y1="10" x2="-1" y2="310" stroke="#e0e0e0" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
            <!-- 調整重り（スライダー） -->
            <rect x="-20" y="170" width="40" height="26" rx="4" fill="#1e1e1e" stroke="#484848" stroke-width="1.5"/>
            <line x1="-14" y1="183" x2="14" y2="183" stroke="#555" stroke-width="1.5"/>
            <!-- 先端の錘 -->
            <circle cx="0" cy="304" r="34" fill="#2a2a2a" stroke="#404040" stroke-width="2"/>
            <circle cx="0" cy="304" r="26" fill="#1a1a1a"/>
            <!-- 錘のハイライト -->
            <circle cx="-8" cy="296" r="8" fill="#e8c4b8" opacity="0.9"/>
            <circle cx="-8" cy="296" r="4" fill="#f4d8ce" opacity="0.8"/>
          </g>
        </g>
      </svg>
    </div>

  </div>

  <!-- Right Panel -->
  <div class="step-panel">
    <div class="step-panel-inner" id="main-panel">
      <div id="preset-name">プリセットを選択してください</div>

      <div class="bpm-display-wrap">
        <div id="bpm-value">--</div>
        <div id="bpm-label">BPM</div>
      </div>

      <div class="beat-dots" id="beat-dots"></div>

      <div class="progress-wrap">
        <div class="progress-labels">
          <span id="prog-start">--</span>
          <span id="prog-current">-- BPM</span>
          <span id="prog-end">--</span>
        </div>
        <div class="progress-bar-bg">
          <div id="progress-bar-fill"></div>
        </div>
      </div>
    </div>

    <div id="done-screen">
      <div class="done-title">完了！</div>
      <div class="done-stat">最終 BPM: <span id="done-bpm">--</span></div>
      <div class="done-stat">総ステップ数: <span id="done-steps">--</span></div>
      <button class="footer-btn" id="btn-retry">もう一度</button>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <button class="footer-btn" id="btn-preset-0">ウォーキング1</button>
  <button class="footer-btn" id="btn-preset-1">ウォーキング2</button>
  <div class="footer-spacer"></div>
  <!-- 年齢スライダー -->
  <div class="age-ctrl">
    <div class="age-left">
      <span class="age-num" id="age-disp">40</span>
      <span class="age-unit">歳</span>
      <span class="mhr-text" id="mhr-disp">最大 180 bpm</span>
    </div>
    <div class="age-slider-wrap">
      <input type="range" id="age-slider" min="10" max="90" value="40" oninput="onAge(this.value)">
      <div class="age-range-lbl"><span>10歳</span><span>90歳</span></div>
    </div>
  </div>
  <div class="footer-spacer"></div>
  <button class="footer-btn" id="btn-bt">🔵 Bluetooth</button>
  <button class="footer-btn" id="btn-start" disabled>開始</button>
</footer>

<script>
// ===== CONSTANTS =====
const ZONES = [
  { min: 0,    max: 0.50, color: '#555555', label: '安静' },
  { min: 0.50, max: 0.60, color: '#0284C7', label: 'リハビリ' },
  { min: 0.60, max: 0.70, color: '#16A34A', label: '有酸素運動' },
  { min: 0.70, max: 0.85, color: '#D97706', label: 'トレーニング' },
  { min: 0.85, max: 1.00, color: '#DC2626', label: 'アスリート' },
];

const PRESETS = [
  { name: 'ウォーキング1', start: 75, end: 105 },
  { name: 'ウォーキング2', start: 85, end: 115 },
];
const BEATS_PER_LEVEL = 10;

// ===== STATE =====
const S = {
  running: false,
  selectedPreset: null,
  bpm: 0,
  beatInLevel: 0,
  totalBeats: 0,
  nextBeatTime: 0,
  timer: null,
  hr: 0,
  peakHR: 0,
  age: 40,
  maxHR: 180,
  btDevice: null,
};

// ===== AUDIO =====
let _audioCtx = null;

function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playTone(freq, dur, vol = 0.4, type = 'sine') {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (_) {}
}

// ===== AGE / MAX HR =====
function onAge(v) {
  S.age   = parseInt(v);
  S.maxHR = 220 - S.age;
  document.getElementById('age-disp').textContent = S.age;
  document.getElementById('mhr-disp').textContent = `最大 ${S.maxHR} bpm`;
  buildHRBar(S.maxHR);
  if (S.hr > 0) updateHRBar(S.hr, S.maxHR);
  try { localStorage.setItem('sakura_step_age', S.age); } catch (_) {}
}

// ===== HR BAR GAUGE =====
const BAR_TOP    = 10;
const BAR_HEIGHT = 320;
const BAR_LEFT   = 8;
const BAR_W      = 64;

function buildHRBar(maxHR) {
  const gZones = document.getElementById('hr-zone-bars');
  const gTicks = document.getElementById('hr-ticks');
  gZones.innerHTML = '';
  gTicks.innerHTML = '';

  // ゾーン背景（下が低心拍・上が高心拍）
  ZONES.forEach(zone => {
    const yTop = BAR_TOP + BAR_HEIGHT * (1 - zone.max);
    const h    = BAR_HEIGHT * (zone.max - zone.min);
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', BAR_LEFT);
    rect.setAttribute('y', yTop);
    rect.setAttribute('width', BAR_W);
    rect.setAttribute('height', Math.max(1, h));
    rect.setAttribute('rx', '3');
    rect.setAttribute('fill', zone.color);
    rect.setAttribute('opacity', '0.5');
    rect.setAttribute('id', 'zone-bar-' + zone.label);
    gZones.appendChild(rect);
  });

  // 境界目盛り線＋BPMラベル（年齢連動）
  const LX = BAR_LEFT + BAR_W + 4; // ラベルのx位置
  [0.50, 0.60, 0.70, 0.85, 1.00].forEach(t => {
    const y   = BAR_TOP + BAR_HEIGHT * (1 - t);
    const bpm = Math.round(maxHR * t);

    if (t < 1.00) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', BAR_LEFT - 3);
      line.setAttribute('y1', y);
      line.setAttribute('x2', BAR_LEFT + BAR_W + 3);
      line.setAttribute('y2', y);
      line.setAttribute('stroke', '#3a3a3a');
      line.setAttribute('stroke-width', '1');
      gTicks.appendChild(line);
    }

    // BPM値ラベル
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', LX);
    txt.setAttribute('y', y + 4);
    txt.setAttribute('font-size', '10');
    txt.setAttribute('fill', '#555');
    txt.setAttribute('font-family', "'Helvetica Neue',Arial,sans-serif");
    txt.setAttribute('font-variant-numeric', 'tabular-nums');
    txt.textContent = bpm;
    gTicks.appendChild(txt);
  });
}

function updateHRBar(hr, maxHR) {
  const ratio = Math.min(1, Math.max(0, hr / maxHR));
  const y = BAR_TOP + BAR_HEIGHT * (1 - ratio);

  const indicator = document.getElementById('hr-indicator');
  indicator.setAttribute('y', y - 2);
  indicator.setAttribute('opacity', '1');

  let currentZone = ZONES[0];
  ZONES.forEach(zone => {
    const el = document.getElementById('zone-bar-' + zone.label);
    if (ratio >= zone.min && ratio < zone.max) {
      currentZone = zone;
      if (el) el.setAttribute('opacity', '1');
    } else {
      if (el) el.setAttribute('opacity', '0.25');
    }
  });

  document.getElementById('hr-value-display').textContent = hr;
  const zLabel = document.getElementById('hr-zone-label');
  zLabel.textContent = currentZone.label;
  zLabel.style.color = currentZone.color;
}

// ===== METRONOME ANIMATION =====
// ビートごとに方向を明示指定して alternate に依存しない
let _pendulumAnim  = null;
let _pendulumAngle = -26; // 現在の停止角度
let _pendulumDir   = 1;   // 次に向かう方向 (+1=右, -1=左)

function swingPendulum(bpm) {
  if (bpm <= 0) return;
  const group      = document.getElementById('pendulum-group');
  const durationMs = (60 / bpm) * 1000;

  const from = _pendulumAngle;
  _pendulumDir  *= -1;
  const to       = 26 * _pendulumDir;
  _pendulumAngle = to;

  if (_pendulumAnim) _pendulumAnim.cancel();
  _pendulumAnim = group.animate(
    [
      { transform: `rotate(${from}deg)` },
      { transform: `rotate(${to}deg)` },
    ],
    {
      duration: durationMs,
      easing: 'cubic-bezier(0.45, 0.05, 0.55, 0.95)',
      fill: 'forwards',
    }
  );
}

// ===== BEAT DOTS =====
function buildBeatDots() {
  const container = document.getElementById('beat-dots');
  container.innerHTML = '';
  for (let i = 0; i < BEATS_PER_LEVEL; i++) {
    const dot = document.createElement('div');
    dot.className = 'beat-dot' + (i === 0 ? ' beat-dot--accent' : '');
    dot.id = 'dot-' + i;
    container.appendChild(dot);
  }
}

function updateBeatDots(beatIndex) {
  for (let i = 0; i < BEATS_PER_LEVEL; i++) {
    const dot = document.getElementById('dot-' + i);
    if (!dot) continue;
    dot.classList.toggle('active', i < beatIndex);
  }
}

// ===== PROGRESS BAR =====
function updateProgress() {
  if (!S.selectedPreset) return;
  const preset = PRESETS[S.selectedPreset];
  const range = preset.end - preset.start;
  const current = S.running ? S.bpm : preset.start;
  const ratio = range > 0 ? (current - preset.start) / range : 0;
  const pct = Math.max(0, Math.min(100, ratio * 100));
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('prog-start').textContent = preset.start;
  document.getElementById('prog-current').textContent = current + ' BPM';
  document.getElementById('prog-end').textContent = preset.end;
}

// ===== BPM FLASH =====
let _flashTimer = null;
function flashBPM() {
  const el = document.getElementById('bpm-value');
  el.classList.add('flash');
  if (_flashTimer) clearTimeout(_flashTimer);
  _flashTimer = setTimeout(() => el.classList.remove('flash'), 80);
}

// ===== METRONOME ENGINE =====
function onBeat() {
  S.beatInLevel++;
  S.totalBeats++;

  swingPendulum(S.bpm); // ビートのたびに方向を明示して振り子を動かす

  const isAccent  = (S.beatInLevel === 1);
  const isLevelUp = (S.beatInLevel > BEATS_PER_LEVEL);

  if (isLevelUp) {
    S.bpm++;
    S.beatInLevel = 1;
    const preset = PRESETS[S.selectedPreset];

    if (S.bpm > preset.end) {
      stopMetronome(true);
      return;
    }

    playTone(660, 0.18, 0.45, 'square');
    flashBPM();
    document.getElementById('bpm-value').textContent = S.bpm;
    updateProgress();
    updateBeatDots(1);
  } else {
    if (isAccent) {
      playTone(1200, 0.07, 0.5, 'sine');
    } else {
      playTone(880, 0.05, 0.3, 'sine');
    }
    flashBPM();
    updateBeatDots(S.beatInLevel);
  }
}

function tick() {
  if (!S.running) return;
  if (Date.now() >= S.nextBeatTime - 5) {
    onBeat();
    S.nextBeatTime += 60000 / S.bpm;
  }
  S.timer = setTimeout(tick, Math.max(1, Math.min(S.nextBeatTime - Date.now(), 16)));
}

function startMetronome() {
  if (S.selectedPreset === null) return;
  const preset = PRESETS[S.selectedPreset];
  S.bpm = preset.start;
  S.beatInLevel = 0;
  S.totalBeats = 0;
  S.running = true;
  S.nextBeatTime = Date.now();

  document.getElementById('bpm-value').textContent = S.bpm;
  document.getElementById('prog-start').textContent = preset.start;
  document.getElementById('prog-end').textContent = preset.end;
  document.getElementById('btn-start').textContent = '停止';
  document.getElementById('btn-start').classList.add('stop');
  updateBeatDots(0);
  updateProgress();
  tick();
}

function stopMetronome(completed) {
  S.running = false;
  clearTimeout(S.timer);
  S.timer = null;

  if (completed) {
    showDoneScreen();
  } else {
    document.getElementById('btn-start').textContent = '開始';
    document.getElementById('btn-start').classList.remove('stop');
    document.getElementById('bpm-value').textContent = S.selectedPreset !== null ? PRESETS[S.selectedPreset].start : '--';
    updateBeatDots(0);
    updateProgress();
  }
}

function showDoneScreen() {
  document.getElementById('main-panel').classList.add('hidden');
  document.getElementById('done-screen').classList.add('visible');
  document.getElementById('done-bpm').textContent = S.bpm;
  document.getElementById('done-steps').textContent = S.totalBeats.toLocaleString();
  document.getElementById('btn-start').textContent = '開始';
  document.getElementById('btn-start').classList.remove('stop');
  document.getElementById('btn-start').disabled = true;
  playTone(880, 0.3, 0.5);
  setTimeout(() => playTone(1100, 0.3, 0.5), 320);
  setTimeout(() => playTone(1320, 0.5, 0.5), 640);
}

function hideDoneScreen() {
  document.getElementById('main-panel').classList.remove('hidden');
  document.getElementById('done-screen').classList.remove('visible');
  if (S.selectedPreset !== null) {
    document.getElementById('btn-start').disabled = false;
  }
}

// ===== BLUETOOTH =====
async function connectBT() {
  if (S.btDevice) {
    try { S.btDevice.gatt.disconnect(); } catch (_) {}
    S.btDevice = null;
    document.getElementById('btn-bt').textContent = '🔵 Bluetooth';
    document.getElementById('btn-bt').classList.remove('ok');
    return;
  }
  try {
    const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
    dev.addEventListener('gattserverdisconnected', () => {
      S.btDevice = null;
      document.getElementById('btn-bt').textContent = '🔵 Bluetooth';
      document.getElementById('btn-bt').classList.remove('ok');
    });
    const server = await dev.gatt.connect();
    const svc = await server.getPrimaryService('heart_rate');
    const chr = await svc.getCharacteristic('heart_rate_measurement');
    await chr.startNotifications();
    chr.addEventListener('characteristicvaluechanged', onHR);
    S.btDevice = dev;
    document.getElementById('btn-bt').textContent = '💚 接続済み';
    document.getElementById('btn-bt').classList.add('ok');
  } catch (e) {
    if (e.name !== 'NotFoundError') alert('Bluetooth接続エラー: ' + e.message);
  }
}

function onHR(e) {
  const v = e.target.value;
  const fl = v.getUint8(0);
  const hr = (fl & 0x01) ? v.getUint16(1, true) : v.getUint8(1);
  S.hr = hr;
  if (hr > S.peakHR) S.peakHR = hr;
  updateHRBar(hr, S.maxHR);
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  const h   = String(now.getHours()).padStart(2, '0');
  const m   = String(now.getMinutes()).padStart(2, '0');
  const sec = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}:${sec}`;
}

// ===== INIT =====
function init() {
  // 年齢をLocalStorageから復元して初期化（buildHRBar()もonAge内で呼ばれる）
  let initAge = 40;
  try { const s = localStorage.getItem('sakura_step_age'); if (s) initAge = parseInt(s); } catch (_) {}
  document.getElementById('age-slider').value = initAge;
  onAge(initAge);

  buildBeatDots();
  updateClock();
  setInterval(updateClock, 1000);
  swingPendulum(75); // 起動時に振り子を初期位置へ

  PRESETS.forEach((preset, idx) => {
    const btn = document.getElementById('btn-preset-' + idx);
    btn.addEventListener('click', () => {
      if (S.running) stopMetronome(false);
      S.selectedPreset = idx;
      document.getElementById('preset-name').textContent = preset.name;
      document.getElementById('bpm-value').textContent = preset.start;
      document.getElementById('prog-start').textContent = preset.start;
      document.getElementById('prog-current').textContent = preset.start + ' BPM';
      document.getElementById('prog-end').textContent = preset.end;
      document.getElementById('progress-bar-fill').style.width = '0%';
      document.getElementById('btn-start').disabled = false;
      updateBeatDots(0);
      hideDoneScreen();
      document.querySelectorAll('[id^="btn-preset-"]').forEach((b, i) => {
        b.classList.toggle('selected', i === idx);
      });
    });
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    getAudioCtx();
    if (S.running) {
      stopMetronome(false);
    } else {
      startMetronome();
    }
  });

  document.getElementById('btn-bt').addEventListener('click', connectBT);

  document.getElementById('btn-retry').addEventListener('click', () => {
    hideDoneScreen();
    document.getElementById('bpm-value').textContent = PRESETS[S.selectedPreset].start;
    updateBeatDots(0);
    updateProgress();
  });

  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
