<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サクラ整骨院 ステップ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080808;
    color: #fff;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .header-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #e8c4b8;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  #clock {
    font-size: 22px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: #aaa;
  }
  #btn-fullscreen {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #aaa;
    font-size: 18px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #btn-fullscreen:hover { background: #252525; }

  /* ===== MAIN ===== */
  main {
    display: grid;
    grid-template-columns: 580px 1fr;
    gap: 0;
    overflow: hidden;
  }

  /* --- Left panel --- */
  .tach-panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid #1a1a1a;
    background: #0b0b0b;
    padding: 10px 14px 10px 14px;
    gap: 6px;
    overflow: hidden;
  }

  /* Metronome (top, takes remaining space) */
  .metro-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 0;
  }

  /* HR horizontal bar area (bottom) */
  .hr-bar-h-area {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-top: 4px;
    border-top: 1px solid #1a1a1a;
  }
  .hr-h-info {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  #hr-value-display {
    font-size: 64px;
    font-weight: 900;
    color: #fff;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .hr-bpm-unit {
    font-size: 18px;
    color: #555;
    letter-spacing: 0.08em;
  }
  #hr-zone-label {
    font-size: 22px;
    font-weight: 800;
    color: #555;
    letter-spacing: 0.05em;
  }
  #hr-bar-svg { display: block; width: 100%; }
  #metro-svg {
    width: 100%;
    height: 100%;
    max-width: 460px;
    display: block;
  }

  /* Pendulum animation (controlled by Web Animations API) */
  #pendulum-group {
    transform-box: fill-box;
    transform-origin: 50% 0%;
  }

  /* --- Right panel --- */
  .step-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 32px;
    gap: 14px;
    background: #0d0d0d;
  }

  #preset-name {
    font-size: 22px;
    font-weight: 600;
    color: #aaa;
    letter-spacing: 0.06em;
    min-height: 30px;
  }

  .bpm-display-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  #bpm-value {
    font-size: 120px;
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: #fff;
    transition: opacity 0.04s;
    letter-spacing: -4px;
  }
  #bpm-value.flash { color: #e8c4b8; }
  #bpm-label {
    font-size: 20px;
    color: #555;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Beat dots */
  .beat-dots {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .beat-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #1e1e1e;
    border: 2px solid #333;
    transition: background 0.08s, box-shadow 0.08s;
  }
  .beat-dot.beat-dot--accent { border-color: #e8c4b8; }
  .beat-dot.beat-dot--accent.active {
    background: #e8c4b8;
    box-shadow: 0 0 14px #e8c4b855;
  }
  .beat-dot.active {
    background: #22C55E;
    box-shadow: 0 0 12px #22C55E66;
  }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    max-width: 440px;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .progress-bar-bg {
    width: 100%;
    height: 10px;
    background: #1e1e1e;
    border-radius: 5px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #0284C7, #22C55E, #EAB308);
    border-radius: 5px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* ===== INTERVAL SETTINGS ===== */
  #interval-settings {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  #interval-settings.hidden { display: none; }

  .iset-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .iset-label {
    font-size: 13px;
    color: #666;
    white-space: nowrap;
    min-width: 80px;
  }
  .iset-ctrl {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }
  #interval-phase-disp {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    min-width: 40px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .total-time-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .time-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #888;
    font-size: 13px;
    padding: 7px 12px;
    border-radius: 7px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .time-btn.selected {
    background: #1a2e3a;
    border-color: #0284C7;
    color: #38BDF8;
  }
  .time-btn:hover:not(.selected) { background: #222; }

  /* ===== INTERVAL LIVE ===== */
  #interval-live {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  #interval-live.hidden { display: none; }
  .ilive-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  #interval-phase-countdown {
    font-size: 46px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  #interval-total-countdown {
    font-size: 26px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #888;
    line-height: 1;
  }
  .ilive-lbl {
    font-size: 12px;
    color: #555;
    margin-top: 2px;
  }
  .ilive-divider {
    width: 1px;
    height: 52px;
    background: #222;
  }
  #interval-set-label {
    font-size: 15px;
    color: #777;
  }

  /* Done screen */
  #done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    text-align: center;
  }
  #done-screen.visible { display: flex; }
  .step-panel-inner { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; width: 100%; }
  .step-panel-inner.hidden { display: none; }
  .done-title { font-size: 36px; font-weight: 800; color: #22C55E; letter-spacing: 0.05em; }
  .done-stat { font-size: 18px; color: #aaa; }
  .done-stat span { color: #fff; font-weight: 700; font-size: 22px; }
  #done-time-row { display: none; }
  #btn-retry {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    font-size: 18px;
    padding: 12px 36px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  #btn-retry:hover { background: #252525; }

  /* ===== AGE CONTROL ===== */
  .age-ctrl {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .age-left {
    display: flex;
    align-items: baseline;
    gap: 5px;
    flex-shrink: 0;
  }
  .age-num  { font-size: 22px; font-weight: 900; color: #fff; line-height: 1; }
  .age-unit { font-size: 13px; color: #555; }
  .mhr-text { font-size: 12px; color: #555; white-space: nowrap; }
  .age-slider-wrap { width: 180px; }
  input[type=range] {
    width: 100%; height: 6px;
    -webkit-appearance: none; appearance: none;
    background: #2a2a2a; border-radius: 3px; outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: #e8c4b8; border-radius: 50%; cursor: pointer;
  }
  .age-range-lbl {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #333; margin-top: 3px;
  }

  /* ===== FOOTER ===== */
  footer {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    border-top: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .footer-btn {
    background: #161616;
    border: 1px solid #2a2a2a;
    color: #ccc;
    font-size: 15px;
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .footer-btn:hover { background: #202020; }
  .footer-btn.selected { background: #1a2e3a; border-color: #0284C7; color: #38BDF8; }
  .footer-btn.ok { background: #0f2a1a; border-color: #16A34A; color: #4ADE80; }
  .footer-btn:disabled { opacity: 0.38; cursor: not-allowed; }
  .footer-spacer { flex: 1; }
  #btn-start {
    background: #14532d;
    border-color: #16A34A;
    color: #4ADE80;
    font-size: 17px;
    padding: 10px 34px;
  }
  #btn-start:hover:not(:disabled) { background: #166534; }
  #btn-start.stop { background: #4a0e0e; border-color: #DC2626; color: #F87171; }
  #btn-start.stop:hover { background: #5a1010; }

  /* ===== CALORIE BIG DISPLAY (右パネル・インターバルモード) ===== */
  #kcal-big-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0;
    width: 100%;
  }
  #kcal-big-wrap.visible { display: flex; }
  #kcal-total-big {
    font-size: 110px;
    font-weight: 900;
    color: #EAB308;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    letter-spacing: -4px;
  }
  .kcal-big-unit {
    font-size: 22px;
    color: #888;
    font-weight: 700;
    letter-spacing: 0.08em;
  }

  /* ===== CALORIE DISPLAY ===== */
  .hr-kcal-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 2px 0 4px;
  }
  #kcal-rate-val {
    font-size: 30px;
    font-weight: 900;
    color: #fff;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  #kcal-total-val {
    font-size: 30px;
    font-weight: 900;
    color: #EAB308;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .kcal-lbl { font-size: 13px; color: #555; }
  .kcal-sep { font-size: 16px; color: #2a2a2a; margin: 0 4px; }

  /* ===== SEX / WEIGHT CONTROLS ===== */
  .age-ctrl { flex-wrap: wrap; }
  .age-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sex-ctrl {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .sex-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #888;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 7px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .sex-btn.selected { background: #1a2e3a; border-color: #0284C7; color: #38BDF8; }
  .sex-btn:hover:not(.selected) { background: #222; }
  .weight-num { font-size: 22px; font-weight: 900; color: #fff; line-height: 1; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 767px) {
    /* Header */
    header { padding: 8px 14px; }
    .header-title { font-size: 15px; }
    #clock { font-size: 15px; }
    #btn-fullscreen { font-size: 15px; padding: 5px 8px; }

    /* Main: 縦1列に */
    main {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }

    /* Left panel */
    .tach-panel {
      border-right: none;
      border-bottom: 1px solid #1a1a1a;
      padding: 6px 10px 6px;
      gap: 4px;
    }
    .metro-wrap {
      height: 190px;
      flex: none;
    }
    #metro-svg { max-width: 220px; }

    /* HR bar */
    #hr-value-display { font-size: 38px; }
    .hr-bpm-unit { font-size: 13px; }
    #hr-zone-label { font-size: 16px; }
    #kcal-rate-val { font-size: 22px; }
    #kcal-total-val { font-size: 22px; }
    .kcal-lbl { font-size: 11px; }

    /* Step panel */
    .step-panel { padding: 10px 16px; gap: 8px; }
    #preset-name { font-size: 15px; min-height: 22px; }
    #bpm-value { font-size: 80px; letter-spacing: -2px; }
    #bpm-label { font-size: 15px; }
    .beat-dot { width: 16px; height: 16px; }
    .beat-dots { gap: 6px; }
    .progress-labels { font-size: 12px; }

    /* Kcal big */
    #kcal-total-big { font-size: 72px; letter-spacing: -2px; }
    .kcal-big-unit { font-size: 16px; }

    /* Interval settings */
    .iset-label { min-width: 64px; font-size: 12px; }
    #interval-phase-disp { font-size: 14px; }
    .time-btn { font-size: 12px; padding: 6px 10px; }

    /* Interval live */
    #interval-phase-countdown { font-size: 34px; }
    #interval-total-countdown { font-size: 20px; }
    #interval-set-label { font-size: 13px; }

    /* Done screen */
    .done-title { font-size: 28px; }
    .done-stat  { font-size: 15px; }

    /* Footer: 2行グリッド */
    footer {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      grid-template-rows: auto auto auto;
      gap: 6px 8px;
      padding: 8px 12px;
    }
    #btn-preset-0 { grid-column: 1; grid-row: 1; padding: 9px 4px; font-size: 12px; }
    #btn-preset-1 { grid-column: 2; grid-row: 1; padding: 9px 4px; font-size: 12px; }
    #btn-bt       { grid-column: 3; grid-row: 1; padding: 9px 10px; font-size: 13px; }
    #btn-start    { grid-column: 4; grid-row: 1; padding: 9px 16px; font-size: 15px; }
    #btn-preset-2 { grid-column: 1 / -1; grid-row: 2; font-size: 13px; padding: 9px 8px; }
    .footer-spacer { display: none; }
    .age-ctrl {
      grid-column: 1 / -1;
      grid-row: 3;
      width: 100%;
      gap: 10px;
    }
    .age-slider-wrap { flex: 1; width: auto; }
    .age-num  { font-size: 18px; }
    .mhr-text { font-size: 11px; }

    /* タッチ操作改善 */
    input[type=range] { touch-action: manipulation; }
    .footer-btn { touch-action: manipulation; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">サクラ整骨院 ステップ</div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <button id="btn-fullscreen" title="全画面">⛶</button>
  </div>
</header>

<!-- MAIN -->
<main>
  <!-- Left Panel -->
  <div class="tach-panel">

    <!-- Metronome SVG (top) -->
    <div class="metro-wrap">
      <svg id="metro-svg" viewBox="0 0 380 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="st-face" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#8a6020"/>
            <stop offset="25%"  stop-color="#c8a050"/>
            <stop offset="50%"  stop-color="#d8b868"/>
            <stop offset="75%"  stop-color="#c8a050"/>
            <stop offset="100%" stop-color="#8a6020"/>
          </linearGradient>
          <linearGradient id="st-slot" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#2a1206"/>
            <stop offset="100%" stop-color="#060302"/>
          </linearGradient>
          <linearGradient id="st-wt" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#fff080"/>
            <stop offset="40%"  stop-color="#f4b020"/>
            <stop offset="100%" stop-color="#b87010"/>
          </linearGradient>
          <filter id="st-nglow" x="-80%" y="-5%" width="260%" height="110%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- 3D sides -->
        <polygon points="92,62 37,394 30,400 85,66"    fill="#6a4010"/>
        <polygon points="288,62 343,394 350,400 295,66" fill="#5a3408"/>
        <polygon points="37,394 343,394 350,400 30,400" fill="#3a2006"/>

        <!-- Main body face -->
        <polygon points="92,62 288,62 343,394 37,394" fill="url(#st-face)"/>
        <polygon points="92,62 288,62 343,394 37,394" fill="none" stroke="#2e1404" stroke-width="2"/>

        <!-- Scale marks — left of slot -->
        <line x1="168" y1="90"  x2="84"  y2="90"  stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="110" x2="92"  y2="110" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="168" y1="130" x2="80"  y2="130" stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="150" x2="88"  y2="150" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="168" y1="170" x2="74"  y2="170" stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="190" x2="82"  y2="190" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="168" y1="210" x2="68"  y2="210" stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="230" x2="76"  y2="230" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="168" y1="250" x2="62"  y2="250" stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="270" x2="70"  y2="270" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="168" y1="290" x2="56"  y2="290" stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="310" x2="64"  y2="310" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="168" y1="330" x2="50"  y2="330" stroke="#6a4818" stroke-width="2"/>
        <line x1="168" y1="350" x2="58"  y2="350" stroke="#6a4818" stroke-width="1.2"/>

        <!-- Scale marks — right of slot -->
        <line x1="212" y1="90"  x2="296" y2="90"  stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="110" x2="288" y2="110" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="212" y1="130" x2="300" y2="130" stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="150" x2="292" y2="150" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="212" y1="170" x2="306" y2="170" stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="190" x2="298" y2="190" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="212" y1="210" x2="312" y2="210" stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="230" x2="304" y2="230" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="212" y1="250" x2="318" y2="250" stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="270" x2="310" y2="270" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="212" y1="290" x2="324" y2="290" stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="310" x2="316" y2="310" stroke="#6a4818" stroke-width="1.2"/>
        <line x1="212" y1="330" x2="330" y2="330" stroke="#6a4818" stroke-width="2"/>
        <line x1="212" y1="350" x2="322" y2="350" stroke="#6a4818" stroke-width="1.2"/>

        <!-- BPM label -->
        <text x="190" y="52" text-anchor="middle" font-size="13" fill="#7a5010"
              font-family="'Helvetica Neue',Arial,sans-serif"
              letter-spacing="0.14em" font-weight="700">BPM</text>

        <!-- Central slot (dark arch) -->

<script>
// ===== CONSTANTS =====
const ZONES = [
  { min: 0,    max: 0.50, color: '#555555', label: '安静' },
  { min: 0.50, max: 0.60, color: '#0284C7', label: 'リハビリ' },
  { min: 0.60, max: 0.70, color: '#16A34A', label: '有酸素運動' },
  { min: 0.70, max: 0.85, color: '#EAB308', label: 'トレーニング' },
  { min: 0.85, max: 1.00, color: '#DC2626', label: 'アスリート' },
];

const PRESETS = [
  { name: 'ウォーキング1', type: 'ramp', start: 75, end: 105 },
  { name: 'ウォーキング2', type: 'ramp', start: 85, end: 115 },
  {
    name: 'インターバル速歩',
    type: 'interval',
    phases: [
      { label: '早歩き',   bpm: 105, color: '#EAB308' },
      { label: 'ゆっくり', bpm: 75,  color: '#16A34A' },
    ],
  },
];
const BEATS_PER_LEVEL = 10;

// ===== STATE =====
const S = {
  running: false,
  selectedPreset: null,
  bpm: 0,
  beatInLevel: 0,
  totalBeats: 0,
  nextBeatTime: 0,
  timer: null,
  hr: 0,
  peakHR: 0,
  age: 40,
  maxHR: 180,
  btDevice: null,
  // 体組成
  weight: 60,
  sex: 'male',
  // カロリー
  totalKcal: 0,
  lastHRTime: 0,
  // インターバル専用
  intervalPhase: 0,
  intervalSet: 0,
  intervalPhaseStartTime: 0,
  intervalTotalStartTime: 0,
  intervalPhaseDurationSec: 180,
  intervalTotalDurationSec: 900,
};

// ===== UTILS =====
function formatMMSS(totalSec) {
  const s = Math.max(0, totalSec);
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, '0')}`;
}

// ===== AUDIO =====
let _audioCtx = null;

function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playTone(freq, dur, vol = 0.4, type = 'sine') {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (_) {}
}

// ===== AGE / MAX HR =====
function onAge(v) {
  S.age   = parseInt(v);
  S.maxHR = 220 - S.age;
  document.getElementById('age-disp').textContent = S.age;
  document.getElementById('mhr-disp').textContent = `最大 ${S.maxHR} bpm`;
  buildHRBar(S.maxHR);
  if (S.hr > 0) updateHRBar(S.hr, S.maxHR);
  try { localStorage.setItem('sakura_step_age', S.age); } catch (_) {}
}

// ===== SEX / WEIGHT =====
function setSex(v) {
  S.sex = v;
  document.getElementById('btn-sex-male').classList.toggle('selected', v === 'male');
  document.getElementById('btn-sex-female').classList.toggle('selected', v === 'female');
  try { localStorage.setItem('sakura_step_sex', v); } catch (_) {}
  updateCaloriesDisplay();
}

function onWeight(v) {
  S.weight = parseInt(v);
  document.getElementById('weight-disp').textContent = S.weight;
  try { localStorage.setItem('sakura_step_weight', S.weight); } catch (_) {}
  updateCaloriesDisplay();
}

// ===== CALORIE CALCULATION =====
// Keytel et al. (2005) — Sports Medicine
function calcCaloriesPerMin(hr, age, weight, sex) {
  if (hr < 30) return 0;
  let v;
  if (sex === 'male') {
    v = (-55.0969 + 0.6309 * hr + 0.1988 * weight + 0.2017 * age) / 4.184;
  } else {
    v = (-20.4022 + 0.4472 * hr - 0.1263 * weight + 0.074 * age) / 4.184;
  }
  return Math.max(0, v);
}

function updateCaloriesDisplay() {
  const rate   = calcCaloriesPerMin(S.hr, S.age, S.weight, S.sex);
  const total  = S.totalKcal >= 1 ? Math.round(S.totalKcal) : '0';
  document.getElementById('kcal-rate-val').textContent  = (S.hr > 0 && rate > 0) ? rate.toFixed(1) : '--';
  document.getElementById('kcal-total-val').textContent = total;
  document.getElementById('kcal-total-big').textContent = total;
}

// ===== INTERVAL SETTINGS =====
function onIntervalPhaseTime(val) {
  S.intervalPhaseDurationSec = parseInt(val);
  document.getElementById('interval-phase-disp').textContent = formatMMSS(S.intervalPhaseDurationSec);
}

function setTotalTime(min) {
  S.intervalTotalDurationSec = min * 60;
  document.querySelectorAll('.time-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.min) === min);
  });
}

// ===== HR BAR GAUGE (horizontal) =====
// SVG viewBox: 0 0 530 90
// 50%未満（安静域）は非表示。バーは 50%〜100% を全幅にマッピング
const H_BAR_X    = 0;
const H_BAR_Y    = 22;
const H_BAR_W    = 530;
const H_BAR_H    = 50;
const H_DISP_MIN = 0.50;

function ratioToBarX(ratio) {
  return H_BAR_W * (ratio - H_DISP_MIN) / (1 - H_DISP_MIN);
}

function buildHRBar(maxHR) {
  const gZones = document.getElementById('hr-zone-bars');
  const gTicks = document.getElementById('hr-ticks');
  gZones.innerHTML = '';
  gTicks.innerHTML = '';

  // 50%以上のゾーンのみ描画
  ZONES.filter(z => z.max > H_DISP_MIN).forEach(zone => {
    const rMin = Math.max(zone.min, H_DISP_MIN);
    const x    = H_BAR_X + ratioToBarX(rMin);
    const w    = ratioToBarX(zone.max) - ratioToBarX(rMin);
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x);
    rect.setAttribute('y', H_BAR_Y);
    rect.setAttribute('width', Math.max(1, w));
    rect.setAttribute('height', H_BAR_H);
    rect.setAttribute('fill', zone.color);
    rect.setAttribute('opacity', '0.6');
    rect.setAttribute('id', 'zone-bar-' + zone.label);
    gZones.appendChild(rect);

    // ゾーン名ラベル（バー内中央）
    if (w > 46) {
      const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      lbl.setAttribute('x', x + w / 2);
      lbl.setAttribute('y', H_BAR_Y + H_BAR_H / 2 + 5);
      lbl.setAttribute('text-anchor', 'middle');
      lbl.setAttribute('font-size', w > 100 ? '12' : '10');
      lbl.setAttribute('font-weight', '700');
      lbl.setAttribute('fill', 'rgba(255,255,255,0.7)');
      lbl.setAttribute('font-family', "'Helvetica Neue',Arial,sans-serif");
      lbl.setAttribute('pointer-events', 'none');
      lbl.setAttribute('id', 'zone-lbl-' + zone.label);
      lbl.textContent = zone.label;
      gZones.appendChild(lbl);
    }
  });

  // BPMラベル + 境界縦線（50%, 60%, 70%, 85%, 100%）
  [0.50, 0.60, 0.70, 0.85, 1.00].forEach(t => {
    const x      = H_BAR_X + ratioToBarX(t);
    const bpm    = Math.round(maxHR * t);
    const anchor = t === 1.00 ? 'end' : t === 0.50 ? 'start' : 'middle';

    if (t > H_DISP_MIN && t < 1.00) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x); line.setAttribute('y1', H_BAR_Y);
      line.setAttribute('x2', x); line.setAttribute('y2', H_BAR_Y + H_BAR_H);
      line.setAttribute('stroke', '#111');
      line.setAttribute('stroke-width', '2');
      gTicks.appendChild(line);
    }

    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', x);
    txt.setAttribute('y', H_BAR_Y - 6);
    txt.setAttribute('text-anchor', anchor);
    txt.setAttribute('font-size', '15');
    txt.setAttribute('font-weight', '700');
    txt.setAttribute('fill', '#999');
    txt.setAttribute('font-family', "'Helvetica Neue',Arial,sans-serif");
    txt.setAttribute('font-variant-numeric', 'tabular-nums');
    txt.textContent = bpm;
    gTicks.appendChild(txt);
  });
}

function updateHRBar(hr, maxHR) {
  const ratio = hr / maxHR;

  if (ratio < H_DISP_MIN) {
    document.getElementById('hr-pointer-group').setAttribute('opacity', '0');
    document.getElementById('hr-value-display').textContent = '--';
    document.getElementById('hr-zone-label').textContent    = '---';
    document.getElementById('hr-zone-label').style.color    = '#555';
    ZONES.forEach(z => {
      const el = document.getElementById('zone-bar-' + z.label);
      if (el) el.setAttribute('opacity', '0.6');
    });
    return;
  }

  const clampedRatio = Math.min(1, ratio);
  const x = H_BAR_X + ratioToBarX(clampedRatio);

  const pg = document.getElementById('hr-pointer-group');
  pg.setAttribute('opacity', '1');
  pg.setAttribute('transform', `translate(${x}, 0)`);

  let currentZone = ZONES[1];
  ZONES.forEach(zone => {
    const el = document.getElementById('zone-bar-' + zone.label);
    if (clampedRatio >= zone.min && clampedRatio < zone.max) {
      currentZone = zone;
      if (el) el.setAttribute('opacity', '1');
    } else {
      if (el) el.setAttribute('opacity', '0.2');
    }
  });

  document.getElementById('hr-ptr-val').textContent     = hr;
  document.getElementById('hr-value-display').textContent = hr;
  const zLabel = document.getElementById('hr-zone-label');
  zLabel.textContent = currentZone.label;
  zLabel.style.color = currentZone.color;
}

// ===== METRONOME ANIMATION =====
let _pendulumAnim  = null;
let _pendulumAngle = -26;
let _pendulumDir   = 1;

function swingPendulum(bpm) {
  if (bpm <= 0) return;
  const group      = document.getElementById('pendulum-group');
  const durationMs = (60 / bpm) * 1000;

  const from = _pendulumAngle;
  _pendulumDir  *= -1;
  const to       = 26 * _pendulumDir;
  _pendulumAngle = to;

  if (_pendulumAnim) _pendulumAnim.cancel();
  _pendulumAnim = group.animate(
    [
      { transform: `rotate(${from}deg)` },
      { transform: `rotate(${to}deg)` },
    ],
    {
      duration: durationMs,
      easing: 'cubic-bezier(0.45, 0.05, 0.55, 0.95)',
      fill: 'forwards',
    }
  );
}

// ===== BEAT DOTS =====
function buildBeatDots() {
  const container = document.getElementById('beat-dots');
  container.innerHTML = '';
  for (let i = 0; i < BEATS_PER_LEVEL; i++) {
    const dot = document.createElement('div');
    dot.className = 'beat-dot' + (i === 0 ? ' beat-dot--accent' : '');
    dot.id = 'dot-' + i;
    container.appendChild(dot);
  }
}

function updateBeatDots(beatIndex) {
  for (let i = 0; i < BEATS_PER_LEVEL; i++) {
    const dot = document.getElementById('dot-' + i);
    if (!dot) continue;
    dot.classList.toggle('active', i < beatIndex);
  }
}

// ===== BPM FLASH =====
let _flashTimer = null;
function flashBPM() {
  const el = document.getElementById('bpm-value');
  el.classList.add('flash');
  if (_flashTimer) clearTimeout(_flashTimer);
  _flashTimer = setTimeout(() => el.classList.remove('flash'), 80);
}

// ===== PROGRESS BAR (ramp mode) =====
function updateProgress() {
  if (S.selectedPreset === null) return;
  const preset = PRESETS[S.selectedPreset];
  if (preset.type !== 'ramp') return;
  const range = preset.end - preset.start;
  const current = S.running ? S.bpm : preset.start;
  const ratio = range > 0 ? (current - preset.start) / range : 0;
  const pct = Math.max(0, Math.min(100, ratio * 100));
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('prog-start').textContent = preset.start;
  document.getElementById('prog-current').textContent = current + ' BPM';
  document.getElementById('prog-end').textContent = preset.end;
}

// ===== RAMP MODE ENGINE =====
function onBeat() {
  S.beatInLevel++;
  S.totalBeats++;

  swingPendulum(S.bpm);

  const isAccent  = (S.beatInLevel === 1);
  const isLevelUp = (S.beatInLevel > BEATS_PER_LEVEL);

  if (isLevelUp) {
    S.bpm++;
    S.beatInLevel = 1;
    const preset = PRESETS[S.selectedPreset];

    if (S.bpm > preset.end) {
      stopMetronome(true);
      return;
    }

    playTone(660, 0.18, 0.45, 'square');
    flashBPM();
    document.getElementById('bpm-value').textContent = S.bpm;
    updateProgress();
    updateBeatDots(1);
  } else {
    if (isAccent) {
      playTone(1200, 0.07, 0.5, 'sine');
    } else {
      playTone(880, 0.05, 0.3, 'sine');
    }
    flashBPM();
    updateBeatDots(S.beatInLevel);
  }
}

function tick() {
  if (!S.running) return;
  if (Date.now() >= S.nextBeatTime - 5) {
    onBeat();
    S.nextBeatTime += 60000 / S.bpm;
  }
  S.timer = setTimeout(tick, Math.max(1, Math.min(S.nextBeatTime - Date.now(), 16)));
}

// ===== INTERVAL MODE ENGINE =====
function onBeatInterval() {
  S.totalBeats++;
  S.beatInLevel++;
  if (S.beatInLevel > BEATS_PER_LEVEL) S.beatInLevel = 1;
  swingPendulum(S.bpm);
  flashBPM();
  if (S.beatInLevel === 1) {
    playTone(1200, 0.07, 0.5, 'sine');
  } else {
    playTone(880, 0.05, 0.3, 'sine');
  }
  updateBeatDots(S.beatInLevel);
}

function tickInterval() {
  if (!S.running) return;
  const now = Date.now();

  // ビート処理
  if (now >= S.nextBeatTime - 5) {
    onBeatInterval();
    S.nextBeatTime += 60000 / S.bpm;
  }

  // トータル残り時間チェック
  const totalElapsed   = (now - S.intervalTotalStartTime) / 1000;
  const totalRemaining = S.intervalTotalDurationSec - totalElapsed;
  if (totalRemaining <= 0) {
    stopMetronome(true);
    return;
  }

  // フェーズ残り時間チェック
  const phaseElapsed   = (now - S.intervalPhaseStartTime) / 1000;
  const phaseRemaining = S.intervalPhaseDurationSec - phaseElapsed;
  if (phaseRemaining <= 0) {
    nextIntervalPhase();
  } else {
    updateIntervalCountdown(phaseRemaining, totalRemaining);
  }

  S.timer = setTimeout(tickInterval, Math.max(1, Math.min(S.nextBeatTime - Date.now(), 100)));
}

function nextIntervalPhase() {
  const preset = PRESETS[S.selectedPreset];
  S.intervalPhase = (S.intervalPhase + 1) % preset.phases.length;
  if (S.intervalPhase === 0) S.intervalSet++;

  S.bpm = preset.phases[S.intervalPhase].bpm;
  S.intervalPhaseStartTime = Date.now();

  // フェーズ切り替え音
  if (S.intervalPhase === 0) {
    // ゆっくり→早歩き：上昇音
    playTone(880, 0.12, 0.5);
    setTimeout(() => playTone(1100, 0.12, 0.5), 140);
    setTimeout(() => playTone(1320, 0.18, 0.5), 280);
  } else {
    // 早歩き→ゆっくり：下降音
    playTone(1100, 0.12, 0.4);
    setTimeout(() => playTone(880, 0.12, 0.4), 140);
    setTimeout(() => playTone(660, 0.18, 0.4), 280);
  }
  updateIntervalDisplay();
}

function updateIntervalDisplay() {
  const preset = PRESETS[S.selectedPreset];
  const phase  = preset.phases[S.intervalPhase];
  const emoji  = S.intervalPhase === 0 ? '🏃' : '🚶';
  document.getElementById('preset-name').textContent = `${emoji} ${phase.label} — セット ${S.intervalSet + 1}`;
  document.getElementById('preset-name').style.color = phase.color;
  document.getElementById('bpm-value').textContent   = S.bpm;
  document.getElementById('interval-set-label').textContent = `セット ${S.intervalSet + 1}`;
  document.getElementById('progress-bar-fill').style.background = phase.color;
}

function updateIntervalCountdown(phaseRemaining, totalRemaining) {
  document.getElementById('interval-phase-countdown').textContent = formatMMSS(phaseRemaining);
  document.getElementById('interval-total-countdown').textContent = formatMMSS(totalRemaining);
  // フェーズ進行バー（経過 / 総フェーズ時間）
  const elapsed = S.intervalPhaseDurationSec - phaseRemaining;
  const pct = Math.max(0, Math.min(100, (elapsed / S.intervalPhaseDurationSec) * 100));
  document.getElementById('progress-bar-fill').style.width = pct + '%';
}

// ===== START / STOP =====
function startMetronome() {
  if (S.selectedPreset === null) return;
  const preset = PRESETS[S.selectedPreset];

  if (preset.type === 'interval') {
    startIntervalMode();
    return;
  }

  // ramp mode
  S.bpm = preset.start;
  S.beatInLevel = 0;
  S.totalBeats = 0;
  S.totalKcal = 0;
  S.lastHRTime = 0;
  S.running = true;
  S.nextBeatTime = Date.now();
  updateCaloriesDisplay();

  document.getElementById('bpm-value').textContent = S.bpm;
  document.getElementById('prog-start').textContent = preset.start;
  document.getElementById('prog-end').textContent = preset.end;
  document.getElementById('btn-start').textContent = '停止';
  document.getElementById('btn-start').classList.add('stop');
  updateBeatDots(0);
  updateProgress();
  tick();
}

function startIntervalMode() {
  const preset = PRESETS[S.selectedPreset];
  S.intervalPhase          = 0;
  S.intervalSet            = 0;
  S.bpm                    = preset.phases[0].bpm;
  S.beatInLevel            = 0;
  S.totalBeats             = 0;
  S.totalKcal              = 0;
  S.lastHRTime             = 0;
  S.running                = true;
  updateCaloriesDisplay();
  S.nextBeatTime           = Date.now();
  S.intervalPhaseStartTime = Date.now();
  S.intervalTotalStartTime = Date.now();

  document.getElementById('interval-settings').classList.add('hidden');
  document.getElementById('interval-live').classList.remove('hidden');
  document.getElementById('interval-phase-countdown').textContent = formatMMSS(S.intervalPhaseDurationSec);
  document.getElementById('interval-total-countdown').textContent = formatMMSS(S.intervalTotalDurationSec);
  document.getElementById('btn-start').textContent = '停止';
  document.getElementById('btn-start').classList.add('stop');
  document.getElementById('progress-bar-fill').style.width = '0%';
  updateBeatDots(0);
  updateIntervalDisplay();
  tickInterval();
}

function stopMetronome(completed) {
  S.running = false;
  clearTimeout(S.timer);
  S.timer = null;

  const preset = S.selectedPreset !== null ? PRESETS[S.selectedPreset] : null;

  if (completed) {
    if (preset && preset.type === 'interval') {
      document.getElementById('interval-live').classList.add('hidden');
      document.getElementById('interval-settings').classList.remove('hidden');
    }
    showDoneScreen();
    return;
  }

  document.getElementById('btn-start').textContent = '開始';
  document.getElementById('btn-start').classList.remove('stop');

  if (preset) {
    if (preset.type === 'ramp') {
      document.getElementById('bpm-value').textContent = preset.start;
      updateBeatDots(0);
      updateProgress();
    } else if (preset.type === 'interval') {
      document.getElementById('bpm-value').textContent = preset.phases[0].bpm;
      document.getElementById('preset-name').textContent = preset.name;
      document.getElementById('preset-name').style.color = '#aaa';
      document.getElementById('interval-live').classList.add('hidden');
      document.getElementById('interval-settings').classList.remove('hidden');
      document.getElementById('progress-bar-fill').style.width = '0%';
      document.getElementById('progress-bar-fill').style.background = preset.phases[0].color;
      updateBeatDots(0);
    }
  } else {
    document.getElementById('bpm-value').textContent = '--';
  }
}

function showDoneScreen() {
  document.getElementById('main-panel').classList.add('hidden');
  document.getElementById('done-screen').classList.add('visible');
  document.getElementById('done-bpm').textContent = S.bpm;
  document.getElementById('done-steps').textContent = S.totalBeats.toLocaleString();
  document.getElementById('done-kcal').textContent = Math.round(S.totalKcal);

  const preset = S.selectedPreset !== null ? PRESETS[S.selectedPreset] : null;
  const doneTimeRow = document.getElementById('done-time-row');
  if (preset && preset.type === 'interval') {
    const elapsed = Math.floor((Date.now() - S.intervalTotalStartTime) / 1000);
    document.getElementById('done-time').textContent = formatMMSS(elapsed);
    doneTimeRow.style.display = '';
  } else {
    doneTimeRow.style.display = 'none';
  }

  document.getElementById('btn-start').textContent = '開始';
  document.getElementById('btn-start').classList.remove('stop');
  document.getElementById('btn-start').disabled = true;
  playTone(880, 0.3, 0.5);
  setTimeout(() => playTone(1100, 0.3, 0.5), 320);
  setTimeout(() => playTone(1320, 0.5, 0.5), 640);
}

function hideDoneScreen() {
  document.getElementById('main-panel').classList.remove('hidden');
  document.getElementById('done-screen').classList.remove('visible');
  if (S.selectedPreset !== null) {
    document.getElementById('btn-start').disabled = false;
  }
}

// ===== BLUETOOTH =====
async function connectBT() {
  if (S.btDevice) {
    try { S.btDevice.gatt.disconnect(); } catch (_) {}
    S.btDevice = null;
    document.getElementById('btn-bt').textContent = '🔵 Bluetooth';
    document.getElementById('btn-bt').classList.remove('ok');
    return;
  }
  try {
    const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: ['heart_rate'] }] });
    dev.addEventListener('gattserverdisconnected', () => {
      S.btDevice = null;
      document.getElementById('btn-bt').textContent = '🔵 Bluetooth';
      document.getElementById('btn-bt').classList.remove('ok');
    });
    const server = await dev.gatt.connect();
    const svc = await server.getPrimaryService('heart_rate');
    const chr = await svc.getCharacteristic('heart_rate_measurement');
    await chr.startNotifications();
    chr.addEventListener('characteristicvaluechanged', onHR);
    S.btDevice = dev;
    document.getElementById('btn-bt').textContent = '💚 接続済み';
    document.getElementById('btn-bt').classList.add('ok');
  } catch (e) {
    if (e.name !== 'NotFoundError') alert('Bluetooth接続エラー: ' + e.message);
  }
}

function onHR(e) {
  const v = e.target.value;
  const fl = v.getUint8(0);
  const hr = (fl & 0x01) ? v.getUint16(1, true) : v.getUint8(1);

  // 運動中のカロリー累積（前回HRから経過分で加算）
  if (S.running && S.lastHRTime > 0 && S.hr > 0) {
    const elapsedMin = (Date.now() - S.lastHRTime) / 60000;
    S.totalKcal += calcCaloriesPerMin(S.hr, S.age, S.weight, S.sex) * elapsedMin;
  }
  S.lastHRTime = Date.now();

  S.hr = hr;
  if (hr > S.peakHR) S.peakHR = hr;
  updateHRBar(hr, S.maxHR);
  updateCaloriesDisplay();
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  const h   = String(now.getHours()).padStart(2, '0');
  const m   = String(now.getMinutes()).padStart(2, '0');
  const sec = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}:${sec}`;
}

// ===== INIT =====
function init() {
  // 年齢・性別・体重をLocalStorageから復元
  let initAge = 40;
  try { const s = localStorage.getItem('sakura_step_age'); if (s) initAge = parseInt(s); } catch (_) {}
  document.getElementById('age-slider').value = initAge;
  onAge(initAge);

  let initWeight = 60;
  try { const s = localStorage.getItem('sakura_step_weight'); if (s) initWeight = parseInt(s); } catch (_) {}
  document.getElementById('weight-slider').value = initWeight;
  S.weight = initWeight;
  document.getElementById('weight-disp').textContent = initWeight;

  let initSex = 'male';
  try { const s = localStorage.getItem('sakura_step_sex'); if (s) initSex = s; } catch (_) {}
  setSex(initSex);

  document.getElementById('btn-sex-male').addEventListener('click', () => setSex('male'));
  document.getElementById('btn-sex-female').addEventListener('click', () => setSex('female'));

  buildBeatDots();
  updateClock();
  setInterval(updateClock, 1000);
  swingPendulum(75);

  // トータル時間ボタン生成
  const totalBtnsEl = document.getElementById('total-time-btns');
  [5, 10, 15, 20, 25, 30].forEach(min => {
    const b = document.createElement('button');
    b.className = 'time-btn' + (min === 15 ? ' selected' : '');
    b.dataset.min = min;
    b.textContent = min + '分';
    b.addEventListener('click', () => setTotalTime(min));
    totalBtnsEl.appendChild(b);
  });

  // プリセットボタン
  PRESETS.forEach((preset, idx) => {
    const btn = document.getElementById('btn-preset-' + idx);
    if (!btn) return;
    btn.addEventListener('click', () => {
      if (S.running) stopMetronome(false);
      S.selectedPreset = idx;
      document.getElementById('preset-name').style.color = '#aaa';
      document.getElementById('btn-start').disabled = false;
      updateBeatDots(0);
      hideDoneScreen();
      document.querySelectorAll('[id^="btn-preset-"]').forEach((b, i) => {
        b.classList.toggle('selected', i === idx);
      });

      if (preset.type === 'ramp') {
        document.getElementById('preset-name').textContent = preset.name;
        document.getElementById('bpm-value').textContent = preset.start;
        document.getElementById('prog-start').textContent = preset.start;
        document.getElementById('prog-current').textContent = preset.start + ' BPM';
        document.getElementById('prog-end').textContent = preset.end;
        document.getElementById('progress-bar-fill').style.width = '0%';
        document.getElementById('progress-bar-fill').style.background = 'linear-gradient(90deg, #0284C7, #22C55E, #EAB308)';
        document.getElementById('interval-settings').classList.add('hidden');
        document.getElementById('interval-live').classList.add('hidden');
        document.getElementById('kcal-big-wrap').classList.remove('visible');
      } else if (preset.type === 'interval') {
        document.getElementById('preset-name').textContent = preset.name;
        document.getElementById('bpm-value').textContent = preset.phases[0].bpm;
        document.getElementById('interval-settings').classList.remove('hidden');
        document.getElementById('interval-live').classList.add('hidden');
        document.getElementById('prog-start').textContent = '残り';
        document.getElementById('prog-current').textContent = formatMMSS(S.intervalPhaseDurationSec);
        document.getElementById('prog-end').textContent = formatMMSS(S.intervalPhaseDurationSec);
        document.getElementById('progress-bar-fill').style.width = '0%';
        document.getElementById('progress-bar-fill').style.background = preset.phases[0].color;
        document.getElementById('kcal-big-wrap').classList.add('visible');
        updateCaloriesDisplay();
      }
    });
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    getAudioCtx();
    if (S.running) {
      stopMetronome(false);
    } else {
      startMetronome();
    }
  });

  document.getElementById('btn-bt').addEventListener('click', connectBT);

  document.getElementById('btn-retry').addEventListener('click', () => {
    hideDoneScreen();
    const preset = PRESETS[S.selectedPreset];
    if (preset.type === 'ramp') {
      document.getElementById('bpm-value').textContent = preset.start;
      updateBeatDots(0);
      updateProgress();
    } else if (preset.type === 'interval') {
      document.getElementById('bpm-value').textContent = preset.phases[0].bpm;
      document.getElementById('preset-name').textContent = preset.name;
      document.getElementById('preset-name').style.color = '#aaa';
      document.getElementById('interval-settings').classList.remove('hidden');
      document.getElementById('interval-live').classList.add('hidden');
      document.getElementById('progress-bar-fill').style.width = '0%';
      document.getElementById('progress-bar-fill').style.background = preset.phases[0].color;
    }
  });

  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
