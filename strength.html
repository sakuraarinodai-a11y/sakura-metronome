<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サクラ整骨院 筋トレ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080808;
    color: #fff;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; color: #e8c4b8; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  #clock { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; color: #aaa; }
  #btn-fullscreen {
    background: #1a1a1a; border: 1px solid #333; color: #aaa;
    font-size: 18px; padding: 6px 10px; border-radius: 6px;
    cursor: pointer; transition: background 0.15s;
  }
  #btn-fullscreen:hover { background: #252525; }

  /* ===== MAIN ===== */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
  }

  /* --- Bench panel --- */
  .bench-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-right: 1px solid #1a1a1a;
    background: #0b0b0b;
    padding: 16px;
    gap: 16px;
    position: relative;
  }

  /* Countdown overlay */
  #countdown-overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    z-index: 10;
  }
  #countdown-overlay.show { display: flex; }
  #countdown-num {
    font-size: clamp(140px, 22vw, 220px);
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 60px rgba(255,255,255,0.4);
    animation: cnt-pop 0.15s ease-out;
  }
  #countdown-num.buzz { color: #EF4444; text-shadow: 0 0 80px rgba(239,68,68,0.7); }
  @keyframes cnt-pop {
    0%   { transform: scale(1.5); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }
  #bench-video {
    width: 100%;
    max-width: 520px;
    height: auto;
    border-radius: 12px;
    mix-blend-mode: screen;
  }
  #bench-phase-label {
    font-size: clamp(24px, 3vw, 40px);
    font-weight: 900;
    letter-spacing: 0.04em;
    min-height: 52px;
    text-align: center;
  }
  #bench-phase-label.rest     { color: #22C55E; }
  #bench-phase-label.interval { color: #3B82F6; }
  #bench-phase-label.idle     { color: #444; }

  /* --- Strength panel --- */
  .strength-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 28px;
    gap: 16px;
    background: #0d0d0d;
  }
  .strength-card {
    width: 100%;
    max-width: 460px;
    background: #111;
    border: 2px solid #2a2a2a;
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .strength-card.phase-rep      { border-color: #7f1d1d; box-shadow: 0 0 28px rgba(239,68,68,0.18); }
  .strength-card.phase-rest     { border-color: #14532d; box-shadow: 0 0 28px rgba(34,197,94,0.18); }
  .strength-card.phase-interval { border-color: #1e3a5f; box-shadow: 0 0 28px rgba(59,130,246,0.18); }

  /* Mini set dots */
  .mini-set-dots { display: flex; gap: 12px; align-items: center; }
  .mini-dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: #1e1e1e; border: 2px solid #333;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .mini-dot.done      { background: #22C55E; border-color: #22C55E; box-shadow: 0 0 8px #22C55E55; }
  .mini-dot.current   { border-color: #EF4444; box-shadow: 0 0 10px #EF444466; animation: blink-dot 0.7s ease-in-out infinite alternate; }
  .mini-dot.current.rest     { border-color: #22C55E; box-shadow: 0 0 10px #22C55E66; }
  .mini-dot.current.interval { border-color: #3B82F6; box-shadow: 0 0 10px #3B82F666; animation: none; background: #3B82F633; }
  @keyframes blink-dot { from { opacity: 1; } to { opacity: 0.3; } }

  /* Numbers */
  #main-number {
    font-size: clamp(72px, 10vw, 110px);
    font-weight: 900; font-variant-numeric: tabular-nums;
    line-height: 1; letter-spacing: -3px;
    text-align: center; color: #fff; min-height: 100px;
  }
  #main-number.flash { color: #e8c4b8; }
  #main-denom   { font-size: 28px; color: #555; font-weight: 500; min-height: 36px; }
  #set-info     { font-size: 22px; font-weight: 700; color: #aaa; }
  #total-volume { font-size: 16px; color: #555; }
  #total-volume span { color: #e8c4b8; font-weight: 700; }

  /* ===== FOOTER ===== */
  footer {
    display: flex; flex-direction: column; gap: 8px;
    padding: 10px 24px 12px;
    border-top: 1px solid #1a1a1a; background: #0d0d0d;
  }
  .footer-row { display: flex; align-items: center; gap: 12px; width: 100%; }
  .footer-spacer { flex: 1; }

  /* Interval slider */
  .interval-label { font-size: 14px; color: #666; white-space: nowrap; min-width: 80px; }
  #slider-interval {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px; background: #2a2a2a; outline: none; cursor: pointer;
  }
  #slider-interval::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #3B82F6; cursor: pointer;
  }
  #slider-interval::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%; background: #3B82F6; cursor: pointer; border: none;
  }
  #interval-val { font-size: 15px; color: #aaa; font-variant-numeric: tabular-nums; min-width: 50px; text-align: right; }

  /* Weight */
  .weight-btn {
    background: #1a1a1a; border: 1px solid #2a2a2a; color: #aaa;
    font-size: 18px; width: 36px; height: 36px; border-radius: 6px;
    cursor: pointer; font-family: inherit; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0;
  }
  .weight-btn:hover { background: #252525; }
  #weight-display { font-size: 18px; font-weight: 700; color: #fff; min-width: 60px; text-align: center; font-variant-numeric: tabular-nums; }

  #btn-start {
    background: #14532d; border: 1px solid #16A34A; color: #4ADE80;
    font-size: 17px; padding: 10px 34px; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-weight: 700;
    transition: background 0.15s; margin-left: auto;
  }
  #btn-start:hover { background: #166534; }
  #btn-start.stop { background: #4a0e0e; border-color: #DC2626; color: #F87171; }
  #btn-start.stop:hover { background: #5a1010; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">サクラ整骨院 筋トレ</div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <button id="btn-fullscreen" title="全画面">⛶</button>
  </div>
</header>

<!-- MAIN -->
<main>
  <!-- Bench Press Video Panel -->
  <div class="bench-panel">
    <video id="bench-video" muted playsinline preload="auto">
      <source src="bench.mp4"  type="video/mp4">
      <source src="bench.webm" type="video/webm">
    </video>
    <div id="bench-phase-label" class="idle">スタート待ち</div>

    <!-- Countdown overlay -->
    <div id="countdown-overlay">
      <div id="countdown-num">7</div>
    </div>
  </div>

  <!-- Strength Panel -->
  <div class="strength-panel">
    <div class="strength-card" id="strength-card">
      <div class="mini-set-dots" id="mini-set-dots"></div>
      <div id="main-number">--</div>
      <div id="main-denom"></div>
      <div id="set-info">1セット目</div>
      <div id="total-volume">総ボリューム: <span id="volume-val">0 kg</span></div>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-row">
    <span class="interval-label">インターバル</span>
    <input type="range" id="slider-interval" min="30" max="180" step="5" value="60">
    <span id="interval-val">60秒</span>
  </div>
  <div class="footer-row">
    <button class="weight-btn" id="btn-weight-down">◀</button>
    <div id="weight-display">20 kg</div>
    <button class="weight-btn" id="btn-weight-up">▶</button>
    <div class="footer-spacer"></div>
    <button id="btn-start">開始</button>
  </div>
</footer>

<script>
// ===== CONSTANTS =====
const TEMPO         = 33;
const REPS_PER_MINI = 13;
const REST_BEATS    = 6;
const MINI_SETS     = 4;

// ===== STATE =====
const S = {
  running: false,
  phase: 'idle',
  miniSet: 1,
  repCount: 0,
  restCount: 0,
  setNum: 1,
  totalReps: 0,
  nextBeatTime: 0,
  timer: null,
  intervalTimer: null,
  intervalEndTime: 0,
  displayTimer: null,
  weight: 20,
  interval: 60,
};

// ===== AUDIO =====
let _audioCtx = null;

function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playTone(freq, dur, vol = 0.4) {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (_) {}
}

// ===== COUNTDOWN =====
const COUNTDOWN_FROM = 7;
let _cdTimer = null;
let _cdVal   = COUNTDOWN_FROM;

function playBeep() {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
    osc.start(); osc.stop(ctx.currentTime + 0.12);
  } catch (_) {}
}

function playBuzzer() {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth'; osc.frequency.value = 660;
    gain.gain.setValueAtTime(0.7, ctx.currentTime);
    gain.gain.setValueAtTime(0.7, ctx.currentTime + 0.55);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.75);
    osc.start(); osc.stop(ctx.currentTime + 0.75);
  } catch (_) {}
}

function showCountdown(n) {
  const overlay = document.getElementById('countdown-overlay');
  const numEl   = document.getElementById('countdown-num');
  // force re-trigger animation
  numEl.classList.remove('buzz');
  numEl.textContent = n;
  void numEl.offsetWidth;                // reflow
  numEl.classList.toggle('buzz', n === 0);
  overlay.classList.add('show');
}

function hideCountdown() {
  document.getElementById('countdown-overlay').classList.remove('show');
}

function startCountdown() {
  _cdVal = COUNTDOWN_FROM;
  S.phase = 'countdown';
  document.getElementById('btn-start').textContent = '停止';
  document.getElementById('btn-start').classList.add('stop');
  document.getElementById('bench-phase-label').textContent = '';
  updateMiniSetDots();
  tickCountdown();
}

function tickCountdown() {
  if (S.phase !== 'countdown') return;
  if (_cdVal > 0) {
    showCountdown(_cdVal);
    playBeep();
    _cdVal--;
    _cdTimer = setTimeout(tickCountdown, 1000);
  } else {
    // ブザーで開始
    showCountdown('GO');
    playBuzzer();
    _cdTimer = setTimeout(() => {
      hideCountdown();
      beginTraining();
    }, 800);
  }
}

function cancelCountdown() {
  clearTimeout(_cdTimer);
  _cdTimer = null;
  hideCountdown();
  S.phase = 'idle';
}

// ===== VIDEO CONTROL =====
// 動画(27秒・13回)をミニセット開始時に再生し、13回完了で停止
// playbackRate = 動画尺 ÷ 1ミニセット所要時間 で自動同期

function startRepVideo() {
  const video = document.getElementById('bench-video');
  if (!video.duration) return;
  const miniSetDuration = REPS_PER_MINI * (60 / TEMPO);   // 約23.6秒
  video.playbackRate = Math.min(video.duration / miniSetDuration, 15.9);
  video.currentTime  = 0;
  video.play().catch(() => {});
}

function pauseRepVideo() {
  const video = document.getElementById('bench-video');
  video.pause();
}

// ===== MINI SET DOTS =====
function buildMiniSetDots() {
  const container = document.getElementById('mini-set-dots');
  container.innerHTML = '';
  for (let i = 0; i < MINI_SETS; i++) {
    const dot = document.createElement('div');
    dot.className = 'mini-dot';
    dot.id = 'mini-dot-' + i;
    container.appendChild(dot);
  }
}

function updateMiniSetDots() {
  for (let i = 0; i < MINI_SETS; i++) {
    const dot = document.getElementById('mini-dot-' + i);
    if (!dot) continue;
    dot.classList.remove('done', 'current', 'rest', 'interval');
    if (S.phase === 'idle') {
      // all dark
    } else if (S.phase === 'interval') {
      if (i < S.miniSet - 1)      dot.classList.add('done');
      else if (i === S.miniSet - 1) dot.classList.add('current', 'interval');
    } else {
      const ci = S.miniSet - 1;
      if (i < ci)      dot.classList.add('done');
      else if (i === ci) {
        dot.classList.add('current');
        if (S.phase === 'rest') dot.classList.add('rest');
      }
    }
  }
}

// ===== MAIN NUMBER FLASH =====
let _flashTimer = null;
function flashMain() {
  const el = document.getElementById('main-number');
  el.classList.add('flash');
  if (_flashTimer) clearTimeout(_flashTimer);
  _flashTimer = setTimeout(() => el.classList.remove('flash'), 70);
}

// ===== UPDATE DISPLAY =====
function updateDisplay() {
  const card       = document.getElementById('strength-card');
  const mainNumber = document.getElementById('main-number');
  const mainDenom  = document.getElementById('main-denom');
  const setInfo    = document.getElementById('set-info');
  const volumeVal  = document.getElementById('volume-val');
  const benchLabel = document.getElementById('bench-phase-label');

  card.classList.remove('phase-rep', 'phase-rest', 'phase-interval');
  if (S.phase === 'rep')      card.classList.add('phase-rep');
  if (S.phase === 'rest')     card.classList.add('phase-rest');
  if (S.phase === 'interval') card.classList.add('phase-interval');

  benchLabel.classList.remove('rest', 'interval', 'idle');
  if (S.phase === 'rep') {
    benchLabel.textContent = '';
  } else if (S.phase === 'rest') {
    benchLabel.textContent = '小休止';
    benchLabel.classList.add('rest');
  } else if (S.phase === 'interval') {
    benchLabel.textContent = 'インターバル';
    benchLabel.classList.add('interval');
  } else {
    benchLabel.textContent = 'スタート待ち';
    benchLabel.classList.add('idle');
  }

  if (S.phase === 'rep') {
    mainNumber.textContent = S.repCount;
    mainDenom.textContent  = '/ ' + REPS_PER_MINI;
  } else if (S.phase === 'rest') {
    mainNumber.textContent = S.restCount;
    mainDenom.textContent  = '/ ' + REST_BEATS;
  } else if (S.phase === 'interval') {
    const remaining = Math.max(0, Math.ceil((S.intervalEndTime - Date.now()) / 1000));
    mainNumber.textContent = remaining;
    mainDenom.textContent  = '秒';
  } else {
    mainNumber.textContent = '--';
    mainDenom.textContent  = '';
  }

  setInfo.textContent   = S.setNum + 'セット目';
  volumeVal.textContent = (S.weight * S.totalReps).toLocaleString() + ' kg';
  updateMiniSetDots();
}

// ===== BEAT LOGIC =====
// セット構成: 13回rep → 6拍rest × 3回 → 13回rep → インターバル = 1セット
function onBeat() {
  if (S.phase === 'rep') {
    S.repCount++;
    S.totalReps++;
    playTone(880, 0.06, 0.35);
    flashMain();
    if (S.repCount >= REPS_PER_MINI) {
      S.repCount = 0;
      pauseRepVideo();
      if (S.miniSet >= MINI_SETS) {
        startInterval();
        return;
      } else {
        S.phase     = 'rest';
        S.restCount = 0;
        playTone(660, 0.2, 0.4);
      }
    }
  } else if (S.phase === 'rest') {
    S.restCount++;
    playTone(440, 0.06, 0.2);
    if (S.restCount >= REST_BEATS) {
      S.miniSet++;
      S.phase     = 'rep';
      S.restCount = 0;
      startRepVideo();
      playTone(1100, 0.1, 0.5);
    }
  }
  updateDisplay();
}

function tick() {
  if (!S.running) return;
  if (Date.now() >= S.nextBeatTime - 5) {
    onBeat();
    S.nextBeatTime += 60000 / TEMPO;
  }
  S.timer = setTimeout(tick, Math.max(1, Math.min(S.nextBeatTime - Date.now(), 16)));
}

// ===== INTERVAL =====
function startInterval() {
  S.phase = 'interval';
  clearTimeout(S.timer);
  S.intervalEndTime = Date.now() + S.interval * 1000;
  S.intervalTimer   = setTimeout(endInterval, S.interval * 1000);
  playTone(440, 0.4, 0.4);
  tickIntervalDisplay();
  updateDisplay();
}

function endInterval() {
  S.setNum++;
  S.miniSet   = 1;
  S.repCount  = 0;
  S.restCount = 0;
  S.phase     = 'rep';
  S.nextBeatTime = Date.now();
  startRepVideo();
  playTone(1100, 0.12, 0.5);
  tick();
  updateDisplay();
}

function tickIntervalDisplay() {
  if (S.phase !== 'interval') return;
  updateDisplay();
  S.displayTimer = setTimeout(tickIntervalDisplay, 500);
}

// ===== START / STOP =====
function beginTraining() {
  // カウントダウン終了後に呼ばれる実際のスタート
  S.running      = true;
  S.phase        = 'rep';
  S.miniSet      = 1;
  S.repCount     = 0;
  S.restCount    = 0;
  S.setNum       = 1;
  S.totalReps    = 0;
  S.nextBeatTime = Date.now();
  startRepVideo();
  updateDisplay();
  tick();
}

function stopTraining() {
  cancelCountdown();
  S.running = false;
  clearTimeout(S.timer);
  clearTimeout(S.intervalTimer);
  clearTimeout(S.displayTimer);
  pauseRepVideo();
  S.timer = S.intervalTimer = S.displayTimer = null;
  S.phase = 'idle';

  const btn = document.getElementById('btn-start');
  btn.textContent = '開始';
  btn.classList.remove('stop');
  updateDisplay();
}

// ===== WEIGHT =====
function setWeight(w) {
  const clamped = Math.max(5, Math.min(90, Math.round(w / 5) * 5));
  S.weight = clamped;
  document.getElementById('weight-display').textContent = clamped + ' kg';
  updateDisplay();
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');
}

// ===== INIT =====
function init() {
  buildMiniSetDots();
  updateDisplay();
  updateClock();
  setInterval(updateClock, 1000);

  document.getElementById('btn-start').addEventListener('click', () => {
    getAudioCtx();
    if (S.running || S.phase === 'interval' || S.phase === 'countdown') {
      stopTraining();
    } else {
      startCountdown();
    }
  });

  const sliderInterval = document.getElementById('slider-interval');
  sliderInterval.addEventListener('input', () => {
    S.interval = parseInt(sliderInterval.value, 10);
    document.getElementById('interval-val').textContent = S.interval + '秒';
  });

  document.getElementById('btn-weight-down').addEventListener('click', () => setWeight(S.weight - 5));
  document.getElementById('btn-weight-up').addEventListener('click',   () => setWeight(S.weight + 5));

  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen().catch(() => {});
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
