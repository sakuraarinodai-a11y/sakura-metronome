<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.svg">
<title>サクラ整骨院 筋トレ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080808;
    color: #fff;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; color: #e8c4b8; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  #clock { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; color: #aaa; }
  #btn-fullscreen {
    background: #1a1a1a; border: 1px solid #333; color: #aaa;
    font-size: 18px; padding: 6px 10px; border-radius: 6px;
    cursor: pointer; transition: background 0.15s;
  }
  #btn-fullscreen:hover { background: #252525; }

  /* ===== MAIN ===== */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
  }

  /* --- Bench panel --- */
  .bench-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-right: 1px solid #1a1a1a;
    background: #0b0b0b;
    padding: 10px 16px;
    gap: 6px;
    position: relative;
  }

  /* Countdown overlay */
  #countdown-overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    z-index: 10;
  }
  #countdown-overlay.show { display: flex; }
  #countdown-num {
    font-size: clamp(140px, 22vw, 220px);
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 60px rgba(255,255,255,0.4);
    animation: cnt-pop 0.15s ease-out;
  }
  #countdown-num.buzz { color: #EF4444; text-shadow: 0 0 80px rgba(239,68,68,0.7); }
  @keyframes cnt-pop {
    0%   { transform: scale(1.5); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }
  /* 動画ラッパー */
  .video-wrapper {
    width: 100%;
    max-width: 520px;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  #bench-video {
    width: 100%;
    display: block;
    mix-blend-mode: screen;
  }

  /* 総ボリューム（動画上・大表示） */
  #bench-volume {
    font-size: clamp(26px, 3.8vw, 48px);
    font-weight: 900;
    color: #e8c4b8;
    letter-spacing: 0.02em;
    text-align: center;
    line-height: 1.1;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 10px 20px;
    width: 100%;
    max-width: 520px;
  }
  #bench-volume .vol-label {
    font-size: 0.38em;
    color: #aaa;
    font-weight: 600;
    display: block;
    margin-bottom: 3px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  #bench-phase-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(48px, 7vw, 90px);
    font-weight: 900;
    letter-spacing: 0.08em;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #bench-phase-label span {
    background: rgba(0,0,0,0.62);
    padding: 0.1em 0.45em;
    border-radius: 0.18em;
  }
  #bench-phase-label.rest {
    color: #4ADE80;
    text-shadow: 0 0 40px rgba(34,197,94,0.8), 0 0 80px rgba(34,197,94,0.4);
    opacity: 1;
  }
  #bench-phase-label.interval {
    color: #60A5FA;
    text-shadow: 0 0 40px rgba(59,130,246,0.8), 0 0 80px rgba(59,130,246,0.4);
    opacity: 1;
  }

  /* --- Strength panel --- */
  .strength-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-y: auto;
    padding: 12px 24px;
    gap: 10px;
    background: #0d0d0d;
  }
  .strength-card {
    width: 100%;
    max-width: 460px;
    background: #111;
    border: 2px solid #2a2a2a;
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .strength-card.phase-rep      { border-color: #7f1d1d; box-shadow: 0 0 28px rgba(239,68,68,0.18); }
  .strength-card.phase-rest     { border-color: #14532d; box-shadow: 0 0 28px rgba(34,197,94,0.18); }
  .strength-card.phase-interval { border-color: #1e3a5f; box-shadow: 0 0 28px rgba(59,130,246,0.18); }

  /* Mini set dots */
  .mini-set-dots { display: flex; gap: 12px; align-items: center; }
  .mini-dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: #1e1e1e; border: 2px solid #333;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .mini-dot.done      { background: #22C55E; border-color: #22C55E; box-shadow: 0 0 8px #22C55E55; }
  .mini-dot.current   { border-color: #EF4444; box-shadow: 0 0 10px #EF444466; animation: blink-dot 0.7s ease-in-out infinite alternate; }
  .mini-dot.current.rest     { border-color: #22C55E; box-shadow: 0 0 10px #22C55E66; }
  .mini-dot.current.interval { border-color: #3B82F6; box-shadow: 0 0 10px #3B82F666; animation: none; background: #3B82F633; }
  @keyframes blink-dot { from { opacity: 1; } to { opacity: 0.3; } }

  /* Numbers */
  #main-number {
    font-size: clamp(72px, 10vw, 110px);
    font-weight: 900; font-variant-numeric: tabular-nums;
    line-height: 1; letter-spacing: -3px;
    text-align: center; color: #fff; min-height: 100px;
  }
  #main-number.flash   { color: #e8c4b8; }
  #main-number.warning { color: #FACC15; text-shadow: 0 0 24px rgba(250,204,21,0.6); }
  #main-denom   { font-size: 28px; color: #555; font-weight: 500; min-height: 36px; }
  #set-info     { font-size: 22px; font-weight: 700; color: #aaa; }
  #total-volume { font-size: 16px; color: #555; }
  #total-volume span { color: #e8c4b8; font-weight: 700; }

  /* メトロノーム＋ボタン横並び行 */
  .metro-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 20px;
    width: 100%;
    max-width: 460px;
  }

  /* Interval row (strength-panel内) */
  .interval-row {
    display: flex; align-items: center; gap: 12px;
    width: 100%; max-width: 460px;
    padding: 4px 0;
  }
  .interval-label { font-size: 14px; color: #666; white-space: nowrap; min-width: 80px; }
  #slider-interval {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px; background: #2a2a2a; outline: none; cursor: pointer;
  }
  #slider-interval::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #3B82F6; cursor: pointer;
  }
  #slider-interval::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%; background: #3B82F6; cursor: pointer; border: none;
  }
  #interval-val { font-size: 15px; color: #aaa; font-variant-numeric: tabular-nums; min-width: 50px; text-align: right; }

  /* Weight (カード内・大表示) */
  .weight-control {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    width: 100%;
    padding: 10px 0 4px;
    border-bottom: 1px solid #222;
  }
  .weight-label {
    font-size: 14px;
    color: #666;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .weight-btn {
    background: #1e1e1e; border: 1px solid #333; color: #bbb;
    font-size: 22px; width: 48px; height: 48px; border-radius: 10px;
    cursor: pointer; font-family: inherit; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s; flex-shrink: 0;
  }
  .weight-btn:hover { background: #2a2a2a; border-color: #e8c4b8; color: #e8c4b8; }
  #weight-display {
    font-size: clamp(42px, 6vw, 64px);
    font-weight: 900;
    color: #e8c4b8;
    min-width: 120px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
    line-height: 1;
  }

  /* ===== METRONOME ===== */
  #metronome-svg {
    width: clamp(220px, 48vw, 420px);
    height: auto;
    flex-shrink: 0;
  }

  /* Strength phase label */
  #strength-phase-label {
    font-size: clamp(15px, 2vw, 22px);
    font-weight: 800;
    letter-spacing: 0.1em;
    color: #444;
    min-height: 26px;
    text-align: center;
    padding: 5px 20px;
    border-radius: 100px;
    border: 1.5px solid transparent;
    transition: color 0.3s, border-color 0.3s, background 0.3s, box-shadow 0.3s;
  }
  #strength-phase-label.rep {
    color: #F87171;
    background: rgba(239,68,68,0.10);
    border-color: rgba(239,68,68,0.35);
    box-shadow: 0 0 16px rgba(239,68,68,0.15);
  }
  #strength-phase-label.rest {
    color: #4ADE80;
    background: rgba(34,197,94,0.10);
    border-color: rgba(34,197,94,0.35);
    box-shadow: 0 0 16px rgba(34,197,94,0.15);
  }
  #strength-phase-label.interval {
    color: #60A5FA;
    background: rgba(59,130,246,0.10);
    border-color: rgba(59,130,246,0.35);
    box-shadow: 0 0 16px rgba(59,130,246,0.15);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    body { height: auto; min-height: 100dvh; overflow-y: auto; }
    main { grid-template-columns: 1fr; overflow: visible; }
    .strength-panel { order: -1; padding: 10px; }
    .bench-panel { border-right: none; border-top: 1px solid #1a1a1a; padding: 10px; }
    .strength-card { gap: 10px; padding: 16px; }
    #main-number { font-size: clamp(56px, 17vw, 100px); min-height: 76px; }
    #weight-display { font-size: clamp(34px, 11vw, 54px); }
    #bench-volume { font-size: clamp(20px, 6vw, 38px); }
    #bench-phase-label { font-size: clamp(18px, 5vw, 34px); }
    .metro-row { gap: 14px; }
    #btn-start { width: 64px; height: 64px; font-size: 26px; }
  }

  #btn-start {
    width: 80px; height: 80px; border-radius: 50%;
    background: #14532d; border: 2px solid #16A34A; color: #4ADE80;
    font-size: 34px; line-height: 1;
    cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 24px rgba(34,197,94,0.25);
    flex-shrink: 0;
  }
  #btn-start:hover { background: #166534; box-shadow: 0 0 36px rgba(34,197,94,0.4); }
  #btn-start.stop { background: #4a0e0e; border-color: #DC2626; color: #F87171; box-shadow: 0 0 24px rgba(239,68,68,0.25); }
  #btn-start.stop:hover { background: #5a1010; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">サクラ整骨院 筋トレ</div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <button id="btn-fullscreen" title="全画面">⛶</button>
  </div>
</header>

<!-- MAIN -->
<main>
  <!-- Bench Press Video Panel -->
  <div class="bench-panel">
    <!-- 開始ボタン（総ボリュームの上） -->
    <button id="btn-start">▶</button>

    <!-- 総ボリューム（動画上） -->
    <div id="bench-volume">
      <span class="vol-label">総ボリューム</span>
      <span id="bench-volume-val">0 kg</span>
    </div>

    <!-- 動画 -->
    <div class="video-wrapper">
      <video id="bench-video" muted playsinline preload="auto">
        <source src="bench.mp4"  type="video/mp4">
        <source src="bench.webm" type="video/webm">
      </video>
      <!-- フェーズラベル（動画オーバーレイ） -->
      <div id="bench-phase-label" class="idle"></div>
    </div>

    <!-- Countdown overlay -->
    <div id="countdown-overlay">
      <div id="countdown-num">7</div>
    </div>
  </div>

  <!-- Strength Panel -->
  <div class="strength-panel">

    <!-- メトロノーム＋ボタン横並び -->
    <div class="metro-row">
    <svg id="metronome-svg" viewBox="0 0 280 100" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="led-glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="cursor-glow" x="-400%" y="-20%" width="900%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- 黒背景 -->
      <rect width="280" height="100" fill="#080808" rx="6"/>
      <!-- 左側LEDバー（中央から外へ：緑→黄→赤） -->
      <rect x="95" y="12" width="6" height="50" fill="#00ff44" rx="1" filter="url(#led-glow)"/>
      <rect x="86" y="12" width="6" height="50" fill="#00ff44" rx="1" filter="url(#led-glow)"/>
      <rect x="77" y="12" width="6" height="50" fill="#cccc00" rx="1" filter="url(#led-glow)"/>
      <rect x="68" y="12" width="6" height="50" fill="#cccc00" rx="1" filter="url(#led-glow)"/>
      <rect x="59" y="12" width="6" height="50" fill="#cccc00" rx="1" filter="url(#led-glow)"/>
      <rect x="50" y="12" width="6" height="50" fill="#ff2200" rx="1" filter="url(#led-glow)"/>
      <rect x="41" y="12" width="6" height="50" fill="#ff2200" rx="1" filter="url(#led-glow)"/>
      <rect x="32" y="12" width="6" height="50" fill="#ff2200" rx="1" filter="url(#led-glow)"/>
      <rect x="23" y="12" width="6" height="50" fill="#ff2200" rx="1" filter="url(#led-glow)"/>
      <rect x="14" y="12" width="6" height="50" fill="#ff2200" rx="1" filter="url(#led-glow)"/>
      <rect x="5"  y="12" width="6" height="50" fill="#ff2200" rx="1" filter="url(#led-glow)"/>
      <!-- 中央テキストエリア -->
      <rect x="104" y="8" width="72" height="57" fill="#0d0d0d" rx="3"/>
      <text x="140" y="52" font-family="'Courier New', monospace" font-size="38"
            fill="#00ff44" text-anchor="middle" font-weight="bold">33</text>
      <!-- 右側LEDバー（中央から外へ：緑→黄→赤） -->
      <rect x="179" y="12" width="6" height="50" fill="#00ff44" rx="1" filter="url(#led-glow)"/>
      <rect x="188" y="12" width="6" height="50" fill="#00ff44" rx="1" filter="url(#led-glow)"/>
      <rect x="197" y="12" width="6" height="50" fill="#cccc00" rx="1" filter="url(#led-glow)"/>
      <rect x="206" y="12" width="6" height="50" fill="#cccc00" rx="1" filter="url(#led-glow)"/>
      <rect x="215" y="12" width="6" height="50" fill="#cccc00" rx="1" filter="url(#led-glow)"/>
      <rect x="224" y="12" width="6" height="50" fill="#ff2200" rx="1" filter="url(#led-glow)"/>
      <rect x="233" y="12" width="6" height="50" fill="#ff2200" rx="1" filter="url(#led-glow)"/>
      <rect x="242" y="12" width="6" height="50" fill="#ff2200" rx="1" filter="url(#led-glow)"/>
      <rect x="251" y="12" width="6" height="50" fill="#ff2200" rx="1" filter="url(#led-glow)"/>
      <rect x="260" y="12" width="6" height="50" fill="#ff2200" rx="1" filter="url(#led-glow)"/>
      <rect x="269" y="12" width="6" height="50" fill="#ff2200" rx="1" filter="url(#led-glow)"/>
      <!-- 下部テキスト -->
      <text x="8"   y="86" font-family="monospace" font-size="8" fill="#555">BPM</text>
      <text x="140" y="86" font-family="monospace" font-size="8" fill="#555" text-anchor="middle">33 BPM</text>
      <text x="272" y="86" font-family="monospace" font-size="8" fill="#555" text-anchor="end">&#215;4 SET</text>
      <!-- 振れるカーソル（pendulum-arm） -->
      <g id="pendulum-arm" transform="translate(0,0)">
        <animateTransform
          id="pendulum-anim"
          attributeName="transform"
          type="translate"
          values="-115,0; 115,0; -115,0"
          keyTimes="0;0.5;1"
          dur="3.636s"
          calcMode="spline"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
          repeatCount="indefinite"
          begin="indefinite"
        />
        <line x1="140" y1="10" x2="140" y2="72" stroke="white" stroke-width="8"
              stroke-linecap="round" filter="url(#cursor-glow)" opacity="0.6"/>
        <line x1="140" y1="10" x2="140" y2="72" stroke="white" stroke-width="2"
              stroke-linecap="round" opacity="0.95"/>
      </g>
    </svg>
    </div><!-- /metro-row -->

    <div class="strength-card" id="strength-card">
      <div class="mini-set-dots" id="mini-set-dots"></div>

      <!-- 重量設定（カウンター上） -->
      <div class="weight-control">
        <button class="weight-btn" id="btn-weight-down">◀</button>
        <div id="weight-display">20 kg</div>
        <button class="weight-btn" id="btn-weight-up">▶</button>
      </div>

      <!-- フェーズ名 -->
      <div id="strength-phase-label">スタート待ち</div>

      <div id="main-number">--</div>
      <div id="main-denom"></div>
      <div id="set-info">1セット目</div>
    </div>

    <!-- インターバル設定（赤枠の下） -->
    <div class="interval-row">
      <span class="interval-label">インターバル</span>
      <input type="range" id="slider-interval" min="30" max="180" step="5" value="60">
      <span id="interval-val">60秒</span>
    </div>
  </div>
</main>


<script>
// ===== CONSTANTS =====
const TEMPO         = 33;
const REPS_PER_MINI = 13;
const REST_BEATS    = 6;
const MINI_SETS     = 4;

// ===== STATE =====
const S = {
  running: false,
  phase: 'idle',
  miniSet: 1,
  repCount: 0,
  restCount: 0,
  setNum: 1,
  totalReps: 0,
  totalVolume: 0,
  nextBeatTime: 0,
  timer: null,
  intervalTimer: null,
  intervalEndTime: 0,
  displayTimer: null,
  weight: 20,
  interval: 60,
};

// ===== AUDIO =====
let _audioCtx = null;

function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playTone(freq, dur, vol = 0.4) {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (_) {}
}

// ===== COUNTDOWN =====
const COUNTDOWN_FROM = 7;
let _cdTimer = null;
let _cdVal   = COUNTDOWN_FROM;

function playBeep() {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
    osc.start(); osc.stop(ctx.currentTime + 0.12);
  } catch (_) {}
}

function playBuzzer() {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth'; osc.frequency.value = 660;
    gain.gain.setValueAtTime(0.7, ctx.currentTime);
    gain.gain.setValueAtTime(0.7, ctx.currentTime + 0.55);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.75);
    osc.start(); osc.stop(ctx.currentTime + 0.75);
  } catch (_) {}
}

function showCountdown(n) {
  const overlay = document.getElementById('countdown-overlay');
  const numEl   = document.getElementById('countdown-num');
  // force re-trigger animation
  numEl.classList.remove('buzz');
  numEl.textContent = n;
  void numEl.offsetWidth;                // reflow
  numEl.classList.toggle('buzz', n === 0);
  overlay.classList.add('show');
}

function hideCountdown() {
  document.getElementById('countdown-overlay').classList.remove('show');
}

function startCountdown() {
  _cdVal = COUNTDOWN_FROM;
  S.phase = 'countdown';
  document.getElementById('btn-start').textContent = '■';
  document.getElementById('btn-start').classList.add('stop');
  document.getElementById('bench-phase-label').textContent = '';
  updateMiniSetDots();
  tickCountdown();
}

function tickCountdown() {
  if (S.phase !== 'countdown') return;
  if (_cdVal > 0) {
    showCountdown(_cdVal);
    playBeep();
    _cdVal--;
    _cdTimer = setTimeout(tickCountdown, 1000);
  } else {
    // ブザーで開始
    showCountdown('GO');
    playBuzzer();
    _cdTimer = setTimeout(() => {
      hideCountdown();
      beginTraining();
    }, 800);
  }
}

function cancelCountdown() {
  clearTimeout(_cdTimer);
  _cdTimer = null;
  hideCountdown();
  S.phase = 'idle';
}

// ===== PENDULUM =====
function startPendulum() {
  const anim = document.getElementById('pendulum-anim');
  if (!anim) return;
  anim.setAttribute('dur', (2 * 60 / TEMPO).toFixed(3) + 's');
  try { anim.endElement(); } catch(e) {}
  anim.beginElement();
}

function stopPendulum() {
  const anim = document.getElementById('pendulum-anim');
  if (anim) try { anim.endElement(); } catch(e) {}
}

// ===== VIDEO CONTROL =====
// playbackRate = 動画尺 ÷ 13カウント所要時間 でカウント13と動画末尾を一致させる
// 13カウント所要時間 = 12ビート間隔 = 12 × (60/TEMPO)

function startRepVideo() {
  const video = document.getElementById('bench-video');
  const miniSetDuration = (REPS_PER_MINI - 1) * (60 / TEMPO); // 12ビート分の秒数
  video.playbackRate = video.duration
    ? Math.min(Math.max(video.duration / miniSetDuration, 0.5), 2.0)
    : 1;
  video.currentTime  = 0;
  video.play().catch(() => {});
}

function pauseRepVideo() {
  const video = document.getElementById('bench-video');
  video.pause();
}

// ===== MINI SET DOTS =====
function buildMiniSetDots() {
  const container = document.getElementById('mini-set-dots');
  container.innerHTML = '';
  for (let i = 0; i < MINI_SETS; i++) {
    const dot = document.createElement('div');
    dot.className = 'mini-dot';
    dot.id = 'mini-dot-' + i;
    container.appendChild(dot);
  }
}

function updateMiniSetDots() {
  for (let i = 0; i < MINI_SETS; i++) {
    const dot = document.getElementById('mini-dot-' + i);
    if (!dot) continue;
    dot.classList.remove('done', 'current', 'rest', 'interval');
    if (S.phase === 'idle') {
      // all dark
    } else if (S.phase === 'interval') {
      if (i < S.miniSet - 1)      dot.classList.add('done');
      else if (i === S.miniSet - 1) dot.classList.add('current', 'interval');
    } else {
      const ci = S.miniSet - 1;
      if (i < ci)      dot.classList.add('done');
      else if (i === ci) {
        dot.classList.add('current');
        if (S.phase === 'rest') dot.classList.add('rest');
      }
    }
  }
}

// ===== MAIN NUMBER FLASH =====
let _flashTimer = null;
function flashMain() {
  const el = document.getElementById('main-number');
  el.classList.add('flash');
  if (_flashTimer) clearTimeout(_flashTimer);
  _flashTimer = setTimeout(() => el.classList.remove('flash'), 70);
}

// ===== UPDATE DISPLAY =====
function updateDisplay() {
  const card       = document.getElementById('strength-card');
  const mainNumber = document.getElementById('main-number');
  const mainDenom  = document.getElementById('main-denom');
  const setInfo    = document.getElementById('set-info');
  const benchLabel = document.getElementById('bench-phase-label');

  card.classList.remove('phase-rep', 'phase-rest', 'phase-interval');
  mainNumber.classList.remove('warning');
  if (S.phase === 'rep')                                    card.classList.add('phase-rep');
  if (S.phase === 'rest' || S.phase === 'rest-holding')     card.classList.add('phase-rest');
  if (S.phase === 'interval')                               card.classList.add('phase-interval');

  benchLabel.classList.remove('rest', 'interval', 'idle');
  if (S.phase === 'rep') {
    benchLabel.textContent = '';
  } else if (S.phase === 'rest' || S.phase === 'rest-holding') {
    benchLabel.innerHTML = '<span>小休止</span>';
    benchLabel.classList.add('rest');
  } else if (S.phase === 'interval') {
    benchLabel.innerHTML = '<span>インターバル</span>';
    benchLabel.classList.add('interval');
  } else {
    benchLabel.innerHTML = '';
    benchLabel.classList.add('idle');
  }

  const strengthLabel = document.getElementById('strength-phase-label');
  if (strengthLabel) {
    strengthLabel.classList.remove('rep', 'rest', 'interval');
    if (S.phase === 'rep') {
      strengthLabel.textContent = '筋トレ中';
      strengthLabel.classList.add('rep');
    } else if (S.phase === 'rest' || S.phase === 'rest-holding') {
      strengthLabel.textContent = '小休止';
      strengthLabel.classList.add('rest');
    } else if (S.phase === 'interval') {
      strengthLabel.textContent = 'インターバル';
      strengthLabel.classList.add('interval');
    } else if (S.phase === 'countdown') {
      strengthLabel.textContent = 'カウントダウン';
    } else {
      strengthLabel.textContent = 'スタート待ち';
    }
  }

  if (S.phase === 'rep') {
    mainNumber.textContent = S.repCount;
    mainDenom.textContent  = '/ ' + REPS_PER_MINI;
  } else if (S.phase === 'rest' || S.phase === 'rest-holding') {
    const remaining = S.restCount;
    mainNumber.textContent = remaining;
    mainDenom.textContent  = '/ ' + REST_BEATS;
    if (remaining <= 3) mainNumber.classList.add('warning');
    else                mainNumber.classList.remove('warning');
  } else if (S.phase === 'interval') {
    const remaining = Math.max(0, Math.ceil((S.intervalEndTime - Date.now()) / 1000));
    mainNumber.textContent = remaining;
    mainDenom.textContent  = '秒';
  } else {
    mainNumber.textContent = '--';
    mainDenom.textContent  = '';
  }

  setInfo.textContent   = S.setNum + 'セット目';
  const vol = S.totalVolume.toLocaleString() + ' kg';
  document.getElementById('bench-volume-val').textContent = vol;
  updateMiniSetDots();
}

// ===== BEAT LOGIC =====
// セット構成: 13回rep → 6拍rest × 3回 → 13回rep → インターバル = 1セット
function onBeat() {
  if (S.phase === 'rep') {
    S.repCount++;
    S.totalReps++;
    S.totalVolume += S.weight;
    playTone(880, 0.06, 0.35);
    flashMain();
    if (S.repCount === 1) startRepVideo(); // カウント1と動画を完全同期
    updateDisplay(); // 13回目もちゃんと表示してからリセット

    if (S.repCount >= REPS_PER_MINI) {
      pauseRepVideo();
      // 13を画面に表示したまま450ms保持してから次フェーズへ
      S.phase = 'holding';
      const finishedMini = S.miniSet;
      setTimeout(() => {
        if (S.phase !== 'holding') return; // 停止済みなら何もしない
        S.repCount = 0;
        if (finishedMini >= MINI_SETS) {
          startInterval();
          return;
        }
        S.phase     = 'rest';
        S.restCount = REST_BEATS - 1;
        playTone(660, 0.2, 0.4);
        updateDisplay();
      }, 450);
      return;
    }

  } else if (S.phase === 'rest') {
    S.restCount--;
    if (S.restCount <= 0) {
      S.restCount = 0;
      // "1" を画面に表示したまま450ms保持してから次フェーズへ
      S.phase = 'rest-holding';
      setTimeout(() => {
        if (S.phase !== 'rest-holding') return; // 停止済みなら何もしない
        S.miniSet++;
        S.phase     = 'rep';
        S.restCount = 0;
        playTone(1100, 0.12, 0.5);
        updateDisplay();
      }, 450);
    } else {
      playTone(440, 0.06, 0.2);
    }
    updateDisplay();
  }
}

function tick() {
  if (!S.running) return;
  if (Date.now() >= S.nextBeatTime - 5) {
    onBeat();
    S.nextBeatTime += 60000 / TEMPO;
  }
  S.timer = setTimeout(tick, Math.max(1, Math.min(S.nextBeatTime - Date.now(), 16)));
}

// ===== INTERVAL =====
function startInterval() {
  S.phase = 'interval';
  clearTimeout(S.timer);
  S.intervalEndTime = Date.now() + S.interval * 1000;
  S.intervalTimer   = setTimeout(endInterval, S.interval * 1000);
  playTone(440, 0.4, 0.4);
  tickIntervalDisplay();
  updateDisplay();
}

function endInterval() {
  S.setNum++;
  S.miniSet   = 1;
  S.repCount  = 0;
  S.restCount = 0;
  S.phase     = 'rep';
  S.nextBeatTime = Date.now();
  playTone(1100, 0.12, 0.5);
  tick();
  updateDisplay();
}

function tickIntervalDisplay() {
  if (S.phase !== 'interval') return;
  updateDisplay();
  S.displayTimer = setTimeout(tickIntervalDisplay, 500);
}

// ===== START / STOP =====
function beginTraining() {
  // カウントダウン終了後に呼ばれる実際のスタート
  S.running      = true;
  S.phase        = 'rep';
  S.miniSet      = 1;
  S.repCount     = 0;
  S.restCount    = 0;
  S.setNum       = 1;
  S.totalReps    = 0;
  S.totalVolume  = 0;
  S.nextBeatTime = Date.now();
  startPendulum();
  updateDisplay();
  tick();
}

function stopTraining() {
  cancelCountdown();
  S.running = false;
  clearTimeout(S.timer);
  clearTimeout(S.intervalTimer);
  clearTimeout(S.displayTimer);
  pauseRepVideo();
  stopPendulum();
  S.timer = S.intervalTimer = S.displayTimer = null;
  S.phase = 'idle';

  const btn = document.getElementById('btn-start');
  btn.textContent = '▶';
  btn.classList.remove('stop');
  updateDisplay();
}

// ===== WEIGHT =====
function setWeight(w) {
  const clamped = Math.max(5, Math.min(90, Math.round(w / 5) * 5));
  S.weight = clamped;
  document.getElementById('weight-display').textContent = clamped + ' kg';
  updateDisplay();
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');
}

// ===== VIDEO PRELOAD (Blob化で通信依存を排除) =====
async function preloadVideo() {
  const video = document.getElementById('bench-video');
  try {
    const resp = await fetch('bench.mp4');
    if (!resp.ok) return;
    const blob = await resp.blob();
    video.src = URL.createObjectURL(blob);
    video.load();
  } catch (_) {}
}

// ===== INIT =====
function init() {
  buildMiniSetDots();
  updateDisplay();
  updateClock();
  setInterval(updateClock, 1000);
  preloadVideo();

  document.getElementById('btn-start').addEventListener('click', () => {
    getAudioCtx();
    if (S.running || S.phase === 'interval' || S.phase === 'countdown') {
      stopTraining();
    } else {
      startCountdown();
    }
  });

  const sliderInterval = document.getElementById('slider-interval');
  sliderInterval.addEventListener('input', () => {
    S.interval = parseInt(sliderInterval.value, 10);
    document.getElementById('interval-val').textContent = S.interval + '秒';
  });

  document.getElementById('btn-weight-down').addEventListener('click', () => setWeight(S.weight - 5));
  document.getElementById('btn-weight-up').addEventListener('click',   () => setWeight(S.weight + 5));

  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen().catch(() => {});
  });
}

document.addEventListener('DOMContentLoaded', init);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
