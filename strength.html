<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サクラ整骨院 筋トレ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080808;
    color: #fff;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .header-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #e8c4b8;
  }
  .header-right { display: flex; align-items: center; gap: 14px; }
  #clock {
    font-size: 22px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: #aaa;
  }
  #btn-fullscreen {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #aaa;
    font-size: 18px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  #btn-fullscreen:hover { background: #252525; }

  /* ===== MAIN ===== */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
  }

  /* --- Bench panel --- */
  .bench-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-right: 1px solid #1a1a1a;
    background: #0b0b0b;
    padding: 16px;
    gap: 12px;
  }
  #bench-video {
    width: 100%;
    max-width: 480px;
    height: auto;
    display: none;
    mix-blend-mode: screen;   /* 黒背景を透過させる */
  }
  #bench-svg {
    width: 100%;
    max-width: 480px;
    height: auto;
  }
  #bench-phase-label {
    font-size: clamp(22px, 3vw, 38px);
    font-weight: 900;
    letter-spacing: 0.04em;
    min-height: 48px;
    text-align: center;
  }
  #bench-phase-label.rest     { color: #22C55E; }
  #bench-phase-label.interval { color: #3B82F6; }
  #bench-phase-label.idle     { color: #444; }

  /* --- Strength panel --- */
  .strength-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 28px;
    gap: 16px;
    background: #0d0d0d;
  }
  .strength-card {
    width: 100%;
    max-width: 460px;
    background: #111;
    border: 2px solid #2a2a2a;
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .strength-card.phase-rep      { border-color: #7f1d1d; box-shadow: 0 0 28px rgba(239,68,68,0.18); }
  .strength-card.phase-rest     { border-color: #14532d; box-shadow: 0 0 28px rgba(34,197,94,0.18); }
  .strength-card.phase-interval { border-color: #1e3a5f; box-shadow: 0 0 28px rgba(59,130,246,0.18); }

  /* Mini set dots */
  .mini-set-dots { display: flex; gap: 12px; align-items: center; }
  .mini-dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #1e1e1e;
    border: 2px solid #333;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .mini-dot.done      { background: #22C55E; border-color: #22C55E; box-shadow: 0 0 8px #22C55E55; }
  .mini-dot.current   { border-color: #EF4444; box-shadow: 0 0 10px #EF444466; animation: blink-dot 0.7s ease-in-out infinite alternate; }
  .mini-dot.current.rest     { border-color: #22C55E; box-shadow: 0 0 10px #22C55E66; }
  .mini-dot.current.interval { border-color: #3B82F6; box-shadow: 0 0 10px #3B82F666; animation: none; background: #3B82F633; }
  @keyframes blink-dot { from { opacity: 1; } to { opacity: 0.3; } }

  /* Numbers */
  #main-number {
    font-size: clamp(72px, 10vw, 110px);
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    letter-spacing: -3px;
    text-align: center;
    color: #fff;
    min-height: 100px;
  }
  #main-number.flash { color: #e8c4b8; }
  #main-denom  { font-size: 28px; color: #555; font-weight: 500; min-height: 36px; }
  #set-info    { font-size: 22px; font-weight: 700; color: #aaa; }
  #total-volume { font-size: 16px; color: #555; }
  #total-volume span { color: #e8c4b8; font-weight: 700; }

  /* ===== FOOTER ===== */
  footer {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 24px 12px;
    border-top: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .footer-row { display: flex; align-items: center; gap: 12px; width: 100%; }
  .footer-spacer { flex: 1; }

  /* Interval slider */
  .interval-label { font-size: 14px; color: #666; white-space: nowrap; min-width: 80px; }
  #slider-interval {
    flex: 1;
    -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px;
    background: #2a2a2a; outline: none; cursor: pointer;
  }
  #slider-interval::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: #3B82F6; cursor: pointer;
  }
  #slider-interval::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: #3B82F6; cursor: pointer; border: none;
  }
  #interval-val { font-size: 15px; color: #aaa; font-variant-numeric: tabular-nums; min-width: 50px; text-align: right; }

  /* Weight */
  .weight-btn {
    background: #1a1a1a; border: 1px solid #2a2a2a; color: #aaa;
    font-size: 18px; width: 36px; height: 36px; border-radius: 6px;
    cursor: pointer; font-family: inherit; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0;
  }
  .weight-btn:hover { background: #252525; }
  #weight-display { font-size: 18px; font-weight: 700; color: #fff; min-width: 60px; text-align: center; font-variant-numeric: tabular-nums; }

  #btn-start {
    background: #14532d; border: 1px solid #16A34A; color: #4ADE80;
    font-size: 17px; padding: 10px 34px; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-weight: 700;
    transition: background 0.15s; margin-left: auto;
  }
  #btn-start:hover { background: #166534; }
  #btn-start.stop { background: #4a0e0e; border-color: #DC2626; color: #F87171; }
  #btn-start.stop:hover { background: #5a1010; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">サクラ整骨院 筋トレ</div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <button id="btn-fullscreen" title="全画面">⛶</button>

</header>

<!-- MAIN -->
<main>
  <!-- Bench Press Animation Panel -->
  <div class="bench-panel">
    <!-- Video mode: shown when bench.mp4 or bench.webm is available -->

      <source src="bench.mp4"  type="video/mp4">

    <!-- SVG fallback (detailed illustration) -->

        <linearGradient id="skin-torso" x1="0" y1="0" x2="0" y2="1">

      <!-- Torso (main shape) -->

               C 334 202, 328 216, 290 218

      <!-- Pectoral muscles -->

      <path d="M 297 194 C 272 188, 248 192, 240 197 C 252 207, 282 210, 304 208 C 315 206, 315 197, 297 194 Z"
            fill="#be9870" opacity="0.4"/>
      <!-- Pec inner shadow for definition -->
      <path d="M 210 197 C 224 194, 240 197, 240 197 C 224 202, 208 204, 204 201 Z"

      <path d="M 270 197 C 256 194, 240 197, 240 197 C 256 202, 272 204, 276 201 Z"

      <!-- Sternum line -->

      <ellipse cx="260" cy="210" rx="14" ry="5" fill="#a87850" opacity="0.2"/>

      <!-- Neck -->
      <path d="M 326 190 C 330 180, 346 176, 356 178 C 364 181, 364 200, 352 204 C 340 207, 324 202, 326 190 Z"
            fill="#d0a880"/>

      <!-- Head -->
      <circle cx="370" cy="171" r="26" fill="url(#skin-head)" filter="url(#soft-shadow)"/>
      <!-- Hair -->
      <path d="M 347 157 C 352 142, 374 138, 388 144 C 396 149, 397 158, 394 164
               C 390 155, 370 150, 352 158 Z" fill="#28180a"/>
      <!-- Ear -->
      <ellipse cx="345" cy="173" rx="6" ry="8" fill="#c89068"/>
      <!-- Eye -->
      <ellipse cx="378" cy="168" rx="3.5" ry="3" fill="#180e06"/>

      <!-- Nose -->
      <path d="M 383 170 Q 387 174, 384 176" stroke="#b08060" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      <!-- Mouth (effort grimace) -->
      <path d="M 366 179 Q 374 183, 381 179" stroke="#9a6040" stroke-width="2" fill="none" stroke-linecap="round"/>

      <line id="arm-r" x1="297" y1="188" x2="372" y2="108"

      <!-- Arm highlight -->

            stroke="#e8c898" stroke-width="6" stroke-linecap="round" opacity="0.3"/>

      <!-- BARBELL GROUP — entire unit translates together -->
      <g id="bb-group" transform="translate(0,0)">

        <rect x="62" y="112" width="356" height="6" rx="3" fill="#000" opacity="0.4"/>
        <!-- Bar -->
        <rect x="62" y="104" width="356" height="9" rx="3"

        <!-- Bar top highlight -->

        <!-- Knurling marks -->
        <line x1="108" y1="105" x2="108" y2="112" stroke="#999" stroke-width="1.3" opacity="0.55"/>
        <line x1="115" y1="105" x2="115" y2="112" stroke="#999" stroke-width="1.3" opacity="0.55"/>
        <line x1="122" y1="105" x2="122" y2="112" stroke="#999" stroke-width="1.3" opacity="0.55"/>
        <line x1="129" y1="105" x2="129" y2="112" stroke="#999" stroke-width="1.3" opacity="0.55"/>
        <line x1="351" y1="105" x2="351" y2="112" stroke="#999" stroke-width="1.3" opacity="0.55"/>
        <line x1="358" y1="105" x2="358" y2="112" stroke="#999" stroke-width="1.3" opacity="0.55"/>
        <line x1="365" y1="105" x2="365" y2="112" stroke="#999" stroke-width="1.3" opacity="0.55"/>

        <ellipse id="bb-pr-big" cx="406" cy="108" rx="12" ry="31" fill="url(#plate-dark)"/>
        <ellipse cx="406" cy="108" rx="8"  ry="22" fill="none" stroke="#555" stroke-width="1.2"/>
        <ellipse cx="406" cy="108" rx="4"  ry="11" fill="#0a0a0a"/>

        <ellipse id="bb-pr-sml" cx="390" cy="108" rx="8" ry="21" fill="url(#plate-red)"/>

        <!-- Collars -->

        <rect id="bb-collar-r" x="373" y="101" width="9" height="15" rx="2" fill="#c8c8c8"/>

      <circle id="wrist-r" cx="372" cy="108" r="9" fill="#c8a070"/>
      <!-- Thumb wraps around bar -->

      <circle cx="372" cy="108" r="5" fill="#b89060" opacity="0.7"/>

    <!-- Phase label shown in bench panel -->

  <!-- Strength Panel -->
  <div class="strength-panel">
    <div class="strength-card" id="strength-card">
      <div class="mini-set-dots" id="mini-set-dots"></div>

      <div id="main-denom"></div>

<!-- FOOTER -->
<footer>
  <div class="footer-row">
    <span class="interval-label">インターバル</span>
    <input type="range" id="slider-interval" min="30" max="180" step="5" value="60">
    <span id="interval-val">60秒</span>
  </div>
  <div class="footer-row">
    <button class="weight-btn" id="btn-weight-down">◀</button>
    <div id="weight-display">20 kg</div>

    <div class="footer-spacer"></div>
    <button id="btn-start">開始</button>
  </div>
</footer>

<script>
// ===== CONSTANTS =====
const TEMPO         = 33;
const REPS_PER_MINI = 13;
const REST_BEATS    = 6;
const MINI_SETS     = 4;

const BB_Y_UP   = 108;  // barbell at top (arms extended)
const BB_Y_DOWN = 180;  // barbell on chest

// ===== STATE =====
const S = {
  running: false,
  phase: 'idle',
  miniSet: 1,
  repCount: 0,
  restCount: 0,
  setNum: 1,
  totalReps: 0,
  nextBeatTime: 0,
  timer: null,
  intervalTimer: null,
  intervalEndTime: 0,
  displayTimer: null,
  weight: 20,
  interval: 60,
};

// ===== AUDIO =====
let _audioCtx = null;

function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playTone(freq, dur, vol = 0.4) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (_) {}
}

// ===== BENCH PRESS ANIMATION =====
let _benchAnimId = null;
let _useVideo    = false;

function easeInOut(t) {
  return 0.5 - 0.5 * Math.cos(t * Math.PI);
}

function updateBenchPose(barbellY) {
  // Translate entire barbell group as one unit
  const delta = barbellY - BB_Y_UP;
  document.getElementById('bb-group').setAttribute('transform', `translate(0,${delta})`);
  // Move arms to match barbell
  document.getElementById('arm-l').setAttribute('y2', barbellY);
  document.getElementById('arm-r').setAttribute('y2', barbellY);
  // Move wrists
  document.getElementById('wrist-l').setAttribute('cy', barbellY);
  document.getElementById('wrist-r').setAttribute('cy', barbellY);
}

function triggerRepAnim() {
  if (_useVideo) {
    const video = document.getElementById('bench-video');
    if (video.duration) {
      video.playbackRate = video.duration / (60 / TEMPO);
    }
    video.currentTime = 0;
    video.play().catch(() => {});
    return;
  }
  // SVG animation
  if (_benchAnimId) cancelAnimationFrame(_benchAnimId);
  const beatMs    = 60000 / TEMPO;
  const startTime = performance.now();
  function frame(now) {
    const t = Math.min((now - startTime) / beatMs, 1);
    // 0→0.4: lower, 0.4→0.6: hold bottom, 0.6→1.0: press up
    let p;
    if      (t < 0.4) p = easeInOut(t / 0.4);
    else if (t < 0.6) p = 1;
    else              p = 1 - easeInOut((t - 0.6) / 0.4);
    updateBenchPose(BB_Y_UP + (BB_Y_DOWN - BB_Y_UP) * p);
    if (t < 1) {
      _benchAnimId = requestAnimationFrame(frame);
    } else {
      updateBenchPose(BB_Y_UP);
      _benchAnimId = null;
    }
  }
  _benchAnimId = requestAnimationFrame(frame);
}

function stopBenchAnim() {
  if (_benchAnimId) { cancelAnimationFrame(_benchAnimId); _benchAnimId = null; }
  updateBenchPose(BB_Y_UP);
}

// ===== MINI SET DOTS =====
function buildMiniSetDots() {
  const container = document.getElementById('mini-set-dots');
  container.innerHTML = '';
  for (let i = 0; i < MINI_SETS; i++) {
    const dot = document.createElement('div');
    dot.className = 'mini-dot';
    dot.id = 'mini-dot-' + i;
    container.appendChild(dot);
  }
}

function updateMiniSetDots() {
  for (let i = 0; i < MINI_SETS; i++) {
    const dot = document.getElementById('mini-dot-' + i);
    if (!dot) continue;
    dot.classList.remove('done', 'current', 'rest', 'interval');

    if (S.phase === 'idle') {
      // all dark
    } else if (S.phase === 'interval') {
      if (i < S.miniSet - 1) dot.classList.add('done');
      else if (i === S.miniSet - 1) dot.classList.add('current', 'interval');
    } else {
      const ci = S.miniSet - 1;
      if (i < ci) dot.classList.add('done');
      else if (i === ci) {
        dot.classList.add('current');
        if (S.phase === 'rest') dot.classList.add('rest');
      }
    }
  }
}

// ===== MAIN NUMBER FLASH =====
let _flashTimer = null;
function flashMain() {
  const el = document.getElementById('main-number');
  el.classList.add('flash');
  if (_flashTimer) clearTimeout(_flashTimer);
  _flashTimer = setTimeout(() => el.classList.remove('flash'), 70);
}

// ===== UPDATE DISPLAY =====
function updateDisplay() {
  const card       = document.getElementById('strength-card');
  const mainNumber = document.getElementById('main-number');
  const mainDenom  = document.getElementById('main-denom');
  const setInfo    = document.getElementById('set-info');
  const volumeVal  = document.getElementById('volume-val');
  const benchLabel = document.getElementById('bench-phase-label');

  card.classList.remove('phase-rep', 'phase-rest', 'phase-interval');
  if (S.phase === 'rep')      card.classList.add('phase-rep');
  if (S.phase === 'rest')     card.classList.add('phase-rest');
  if (S.phase === 'interval') card.classList.add('phase-interval');

  benchLabel.classList.remove('rest', 'interval', 'idle');
  if (S.phase === 'rep') {
    benchLabel.textContent = '';
  } else if (S.phase === 'rest') {
    benchLabel.textContent = '小休止';
    benchLabel.classList.add('rest');
  } else if (S.phase === 'interval') {
    benchLabel.textContent = 'インターバル';
    benchLabel.classList.add('interval');
  } else {
    benchLabel.textContent = 'スタート待ち';
    benchLabel.classList.add('idle');
  }

  if (S.phase === 'rep') {
    mainNumber.textContent = S.repCount;
    mainDenom.textContent  = '/ ' + REPS_PER_MINI;
  } else if (S.phase === 'rest') {
    mainNumber.textContent = S.restCount;
    mainDenom.textContent  = '/ ' + REST_BEATS;
  } else if (S.phase === 'interval') {
    const remaining = Math.max(0, Math.ceil((S.intervalEndTime - Date.now()) / 1000));
    mainNumber.textContent = remaining;
    mainDenom.textContent  = '秒';
  } else {
    mainNumber.textContent = '--';
    mainDenom.textContent  = '';
  }

  setInfo.textContent    = S.setNum + 'セット目';
  volumeVal.textContent  = (S.weight * S.totalReps).toLocaleString() + ' kg';
  updateMiniSetDots();
}

// ===== BEAT LOGIC =====
// Set structure: mini-set1(13rep→6rest) × 3 → mini-set4(13rep→interval) = 1セット
function onBeat() {
  if (S.phase === 'rep') {
    S.repCount++;
    S.totalReps++;
    triggerRepAnim();
    playTone(880, 0.06, 0.35);
    flashMain();
    if (S.repCount >= REPS_PER_MINI) {
      S.repCount = 0;
      if (S.miniSet >= MINI_SETS) {
        startInterval();
        return;
      } else {
        S.phase = 'rest';
        S.restCount = 0;
        updateBenchPose(BB_Y_DOWN);
        playTone(660, 0.2, 0.4);
      }
    }
  } else if (S.phase === 'rest') {
    S.restCount++;
    playTone(440, 0.06, 0.2);
    if (S.restCount >= REST_BEATS) {
      S.miniSet++;
      S.phase = 'rep';
      S.restCount = 0;
      playTone(1100, 0.1, 0.5);
    }
  }
  updateDisplay();
}

function tick() {
  if (!S.running) return;
  if (Date.now() >= S.nextBeatTime - 5) {
    onBeat();
    S.nextBeatTime += 60000 / TEMPO;
  }
  S.timer = setTimeout(tick, Math.max(1, Math.min(S.nextBeatTime - Date.now(), 16)));
}

// ===== INTERVAL =====
function startInterval() {
  S.phase = 'interval';
  stopBenchAnim();
  clearTimeout(S.timer);
  S.intervalEndTime = Date.now() + S.interval * 1000;
  S.intervalTimer   = setTimeout(endInterval, S.interval * 1000);
  playTone(440, 0.4, 0.4);
  tickIntervalDisplay();
  updateDisplay();
}

function endInterval() {
  S.setNum++;
  S.miniSet  = 1;
  S.repCount = 0;
  S.restCount = 0;
  S.phase = 'rep';
  S.nextBeatTime = Date.now();
  playTone(1100, 0.12, 0.5);
  tick();
  updateDisplay();
}

function tickIntervalDisplay() {
  if (S.phase !== 'interval') return;
  updateDisplay();
  S.displayTimer = setTimeout(tickIntervalDisplay, 500);
}

// ===== START / STOP =====
function startTraining() {
  S.running   = true;
  S.phase     = 'rep';
  S.miniSet   = 1;
  S.repCount  = 0;
  S.restCount = 0;
  S.setNum    = 1;
  S.totalReps = 0;
  S.nextBeatTime = Date.now();
  updateBenchPose(BB_Y_UP);

  const btn = document.getElementById('btn-start');
  btn.textContent = '停止';
  btn.classList.add('stop');
  updateDisplay();
  tick();
}

function stopTraining() {
  S.running = false;
  clearTimeout(S.timer);
  clearTimeout(S.intervalTimer);
  clearTimeout(S.displayTimer);
  stopBenchAnim();
  S.timer = S.intervalTimer = S.displayTimer = null;
  S.phase = 'idle';

  const btn = document.getElementById('btn-start');
  btn.textContent = '開始';
  btn.classList.remove('stop');
  updateDisplay();
}

// ===== WEIGHT =====
function setWeight(w) {
  const clamped = Math.max(5, Math.min(90, Math.round(w / 5) * 5));
  S.weight = clamped;
  document.getElementById('weight-display').textContent = clamped + ' kg';
  updateDisplay();
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');
}

// ===== INIT =====
function init() {
  // Video availability check
  const video = document.getElementById('bench-video');
  video.addEventListener('loadedmetadata', () => {
    _useVideo = true;
    document.getElementById('bench-svg').style.display = 'none';
    video.style.display = 'block';
  });

  buildMiniSetDots();
  updateBenchPose(BB_Y_UP);
  updateDisplay();
  updateClock();
  setInterval(updateClock, 1000);

  document.getElementById('btn-start').addEventListener('click', () => {
    getAudioCtx();
    if (S.running || S.phase === 'interval') stopTraining();
    else startTraining();
  });

  const sliderInterval = document.getElementById('slider-interval');
  sliderInterval.addEventListener('input', () => {
    S.interval = parseInt(sliderInterval.value, 10);
    document.getElementById('interval-val').textContent = S.interval + '秒';
  });

  document.getElementById('btn-weight-down').addEventListener('click', () => setWeight(S.weight - 5));
  document.getElementById('btn-weight-up').addEventListener('click',   () => setWeight(S.weight + 5));

  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen().catch(() => {});
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
