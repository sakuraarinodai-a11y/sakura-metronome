<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サクラ整骨院 筋トレ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080808;
    color: #fff;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    height: 100dvh;
    overflow: hidden;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid #1a1a1a;
    background: #0d0d0d;
  }
  .header-title { font-size: 20px; font-weight: 700; letter-spacing: 0.05em; color: #e8c4b8; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  #clock { font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; color: #aaa; }
  #btn-fullscreen {
    background: #1a1a1a; border: 1px solid #333; color: #aaa;
    font-size: 18px; padding: 6px 10px; border-radius: 6px;
    cursor: pointer; transition: background 0.15s;
  }
  #btn-fullscreen:hover { background: #252525; }

  /* ===== MAIN ===== */
  main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
  }

  /* --- Bench panel --- */
  .bench-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-right: 1px solid #1a1a1a;
    background: #0b0b0b;
    padding: 10px 16px;
    gap: 6px;
    position: relative;
  }

  /* Countdown overlay */
  #countdown-overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    z-index: 10;
  }
  #countdown-overlay.show { display: flex; }
  #countdown-num {
    font-size: clamp(140px, 22vw, 220px);
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 60px rgba(255,255,255,0.4);
    animation: cnt-pop 0.15s ease-out;
  }
  #countdown-num.buzz { color: #EF4444; text-shadow: 0 0 80px rgba(239,68,68,0.7); }
  @keyframes cnt-pop {
    0%   { transform: scale(1.5); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }
  /* 動画ラッパー：上40%のみクロップ */
  .video-wrapper {
    width: 100%;
    max-width: 520px;
    overflow: hidden;
    border-radius: 12px;
    isolation: isolate;
  }
  #bench-video {
    width: 100%;
    display: block;
    margin-top: -22.5%;   /* 上40%を押し上げ (40% × 9/16 = 22.5%) */
    mix-blend-mode: screen;
  }

  /* 総ボリューム（動画上・大表示） */
  #bench-volume {
    font-size: clamp(26px, 3.8vw, 48px);
    font-weight: 900;
    color: #e8c4b8;
    letter-spacing: 0.02em;
    text-align: center;
    line-height: 1.1;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 10px 20px;
    width: 100%;
    max-width: 520px;
  }
  #bench-volume .vol-label {
    font-size: 0.38em;
    color: #aaa;
    font-weight: 600;
    display: block;
    margin-bottom: 3px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  #bench-phase-label {
    font-size: clamp(24px, 3vw, 40px);
    font-weight: 900;
    letter-spacing: 0.04em;
    min-height: 52px;
    text-align: center;
  }
  #bench-phase-label.rest     { color: #22C55E; }
  #bench-phase-label.interval { color: #3B82F6; }
  #bench-phase-label.idle     { color: #444; }

  /* --- Strength panel --- */
  .strength-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-y: auto;
    padding: 12px 24px;
    gap: 10px;
    background: #0d0d0d;
  }
  .strength-card {
    width: 100%;
    max-width: 460px;
    background: #111;
    border: 2px solid #2a2a2a;
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .strength-card.phase-rep      { border-color: #7f1d1d; box-shadow: 0 0 28px rgba(239,68,68,0.18); }
  .strength-card.phase-rest     { border-color: #14532d; box-shadow: 0 0 28px rgba(34,197,94,0.18); }
  .strength-card.phase-interval { border-color: #1e3a5f; box-shadow: 0 0 28px rgba(59,130,246,0.18); }

  /* Mini set dots */
  .mini-set-dots { display: flex; gap: 12px; align-items: center; }
  .mini-dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: #1e1e1e; border: 2px solid #333;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .mini-dot.done      { background: #22C55E; border-color: #22C55E; box-shadow: 0 0 8px #22C55E55; }
  .mini-dot.current   { border-color: #EF4444; box-shadow: 0 0 10px #EF444466; animation: blink-dot 0.7s ease-in-out infinite alternate; }
  .mini-dot.current.rest     { border-color: #22C55E; box-shadow: 0 0 10px #22C55E66; }
  .mini-dot.current.interval { border-color: #3B82F6; box-shadow: 0 0 10px #3B82F666; animation: none; background: #3B82F633; }
  @keyframes blink-dot { from { opacity: 1; } to { opacity: 0.3; } }

  /* Numbers */
  #main-number {
    font-size: clamp(72px, 10vw, 110px);
    font-weight: 900; font-variant-numeric: tabular-nums;
    line-height: 1; letter-spacing: -3px;
    text-align: center; color: #fff; min-height: 100px;
  }
  #main-number.flash   { color: #e8c4b8; }
  #main-number.warning { color: #FACC15; text-shadow: 0 0 24px rgba(250,204,21,0.6); }
  #main-denom   { font-size: 28px; color: #555; font-weight: 500; min-height: 36px; }
  #set-info     { font-size: 22px; font-weight: 700; color: #aaa; }
  #total-volume { font-size: 16px; color: #555; }
  #total-volume span { color: #e8c4b8; font-weight: 700; }

  /* メトロノーム＋ボタン横並び行 */
  .metro-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 20px;
    width: 100%;
    max-width: 460px;
  }

  /* Interval row (strength-panel内) */
  .interval-row {
    display: flex; align-items: center; gap: 12px;
    width: 100%; max-width: 460px;
    padding: 4px 0;
  }
  .interval-label { font-size: 14px; color: #666; white-space: nowrap; min-width: 80px; }
  #slider-interval {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px; background: #2a2a2a; outline: none; cursor: pointer;
  }
  #slider-interval::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #3B82F6; cursor: pointer;
  }
  #slider-interval::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%; background: #3B82F6; cursor: pointer; border: none;
  }
  #interval-val { font-size: 15px; color: #aaa; font-variant-numeric: tabular-nums; min-width: 50px; text-align: right; }

  /* Weight (カード内・大表示) */
  .weight-control {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    width: 100%;
    padding: 10px 0 4px;
    border-bottom: 1px solid #222;
  }
  .weight-label {
    font-size: 14px;
    color: #666;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .weight-btn {
    background: #1e1e1e; border: 1px solid #333; color: #bbb;
    font-size: 22px; width: 48px; height: 48px; border-radius: 10px;
    cursor: pointer; font-family: inherit; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s; flex-shrink: 0;
  }
  .weight-btn:hover { background: #2a2a2a; border-color: #e8c4b8; color: #e8c4b8; }
  #weight-display {
    font-size: clamp(42px, 6vw, 64px);
    font-weight: 900;
    color: #e8c4b8;
    min-width: 120px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
    line-height: 1;
  }

  /* ===== METRONOME ===== */
  #metronome-svg {
    width: clamp(72px, 10vw, 120px);
    height: auto;
    flex-shrink: 0;
  }

  /* Strength phase label */
  #strength-phase-label {
    font-size: clamp(15px, 2vw, 22px);
    font-weight: 800;
    letter-spacing: 0.1em;
    color: #444;
    min-height: 26px;
    text-align: center;
  }
  #strength-phase-label.rep      { color: #EF4444; }
  #strength-phase-label.rest     { color: #22C55E; }
  #strength-phase-label.interval { color: #3B82F6; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 640px) {
    body { height: auto; min-height: 100dvh; overflow-y: auto; }
    main { grid-template-columns: 1fr; overflow: visible; }
    .strength-panel { order: -1; padding: 10px; }
    .bench-panel { border-right: none; border-top: 1px solid #1a1a1a; padding: 10px; }
    .strength-card { gap: 10px; padding: 16px; }
    #main-number { font-size: clamp(56px, 17vw, 100px); min-height: 76px; }
    #weight-display { font-size: clamp(34px, 11vw, 54px); }
    #bench-volume { font-size: clamp(20px, 6vw, 38px); }
    #bench-phase-label { font-size: clamp(18px, 5vw, 34px); }
    .metro-row { gap: 14px; }
    #btn-start { font-size: 16px; padding: 12px 22px; }
  }

  #btn-start {
    background: #14532d; border: 1px solid #16A34A; color: #4ADE80;
    font-size: 18px; padding: 14px 28px; border-radius: 12px;
    cursor: pointer; font-family: inherit; font-weight: 700;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #btn-start:hover { background: #166534; }
  #btn-start.stop { background: #4a0e0e; border-color: #DC2626; color: #F87171; }
  #btn-start.stop:hover { background: #5a1010; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">サクラ整骨院 筋トレ</div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <button id="btn-fullscreen" title="全画面">⛶</button>
  </div>
</header>

<!-- MAIN -->
<main>
  <!-- Bench Press Video Panel -->
  <div class="bench-panel">
    <!-- 総ボリューム（動画上） -->
    <div id="bench-volume">
      <span class="vol-label">総ボリューム</span>
      <span id="bench-volume-val">0 kg</span>
    </div>

    <!-- 動画（上30%クロップ） -->
    <div class="video-wrapper">
      <video id="bench-video" muted playsinline preload="auto">
        <source src="bench.mp4"  type="video/mp4">
        <source src="bench.webm" type="video/webm">
      </video>
    </div>

    <div id="bench-phase-label" class="idle">スタート待ち</div>

    <!-- Countdown overlay -->
    <div id="countdown-overlay">
      <div id="countdown-num">7</div>
    </div>
  </div>

  <!-- Strength Panel -->
  <div class="strength-panel">

    <!-- メトロノーム＋ボタン横並び -->
    <div class="metro-row">
    <svg id="metronome-svg" viewBox="-75 -65 150 295" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="body-g" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#16202c"/>
          <stop offset="100%" stop-color="#080c10"/>
        </linearGradient>
        <filter id="glow-n" x="-60%" y="-10%" width="220%" height="120%">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-w" x="-80%" y="-80%" width="360%" height="360%">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-tip" x="-200%" y="-200%" width="600%" height="600%">
          <feGaussianBlur stdDeviation="5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-piv" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Body fill -->
      <polygon points="-60,208 60,208 39,22 -39,22" fill="url(#body-g)"/>
      <!-- Body outline (bright tech edge) -->
      <polygon points="-60,208 60,208 39,22 -39,22"
               fill="none" stroke="#2a4060" stroke-width="1.5"/>
      <!-- Corner bracket accents (top) -->
      <polyline points="-29,22 -39,22 -39,36" fill="none" stroke="#3a6090" stroke-width="1.5"/>
      <polyline points="29,22 39,22 39,36"    fill="none" stroke="#3a6090" stroke-width="1.5"/>
      <!-- Corner bracket accents (bottom) -->
      <polyline points="-50,195 -60,208 -48,208" fill="none" stroke="#1e3050" stroke-width="1"/>
      <polyline points="50,195 60,208 48,208"     fill="none" stroke="#1e3050" stroke-width="1"/>

      <!-- Scale arc (pivot=0,85 r=66) -->
      <path d="M -31,27 A 66,66 0 0,1 31,27"
            fill="none" stroke="#1e3050" stroke-width="1.5" stroke-dasharray="2,3"/>
      <!-- Scale LED dots -->
      <!-- θ=0°: (0,19) -->
      <circle cx="0"    cy="19"   r="3"   fill="#60a0e0"/>
      <!-- θ=±13°: (14.8,20.7) -->
      <circle cx="14.8" cy="20.7" r="2"   fill="#3a6090" opacity="0.8"/>
      <circle cx="-14.8" cy="20.7" r="2"  fill="#3a6090" opacity="0.8"/>
      <!-- θ=±26°: (28.9,25.7) -->
      <circle cx="28.9" cy="25.7" r="2"   fill="#243050" opacity="0.7"/>
      <circle cx="-28.9" cy="25.7" r="2"  fill="#243050" opacity="0.7"/>

      <!-- Pendulum group -->
      <g id="pendulum-arm" transform="rotate(0,0,85)">
        <animateTransform
          id="pendulum-anim"
          attributeName="transform"
          type="rotate"
          values="-28,0,85; 28,0,85; -28,0,85"
          keyTimes="0;0.5;1"
          dur="3.64s"
          calcMode="spline"
          keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"
          repeatCount="indefinite"
          begin="indefinite"
        />
        <!-- Counterweight (below pivot) -->
        <rect x="-2" y="86" width="4" height="100" rx="2" fill="#1a2530"/>
        <!-- Needle with glow -->
        <rect x="-1.5" y="-54" width="3" height="142" rx="1.5"
              fill="#c8ddf0" filter="url(#glow-n)"/>
        <!-- Weight diamond with glow -->
        <polygon points="0,-30 15,-12 0,6 -15,-12"
                 fill="#e8c4b8" stroke="#ffddcc" stroke-width="1"
                 filter="url(#glow-w)"/>
        <!-- Weight inner highlight -->
        <polygon points="0,-25 8,-12 0,1 -8,-12" fill="#fff5f0" opacity="0.35"/>
        <!-- Needle tip glow ball -->
        <circle cx="0" cy="-51" r="7" fill="#80b8e8" filter="url(#glow-tip)" opacity="0.6"/>
        <circle cx="0" cy="-51" r="3.5" fill="#c0d8f0"/>
        <circle cx="0" cy="-51" r="1.5" fill="#ffffff"/>
      </g>

      <!-- Pivot with glow rings -->
      <circle cx="0" cy="85" r="12" fill="#0a1420" stroke="#2a5080" stroke-width="1.5"
              filter="url(#glow-piv)"/>
      <circle cx="0" cy="85" r="6"  fill="#1a3050" stroke="#3a70a0" stroke-width="1"/>
      <circle cx="0" cy="85" r="2.5" fill="#60a0e0"/>
      <circle cx="0" cy="85" r="1"   fill="#a0d0ff"/>

      <!-- Base bar -->
      <rect x="-52" y="204" width="104" height="7" rx="3.5"
            fill="#0a1420" stroke="#1e3050" stroke-width="1"/>
      <!-- Feet -->
      <ellipse cx="-30" cy="213" rx="14" ry="4" fill="#080c10" stroke="#1a2a3a" stroke-width="1"/>
      <ellipse cx="30"  cy="213" rx="14" ry="4" fill="#080c10" stroke="#1a2a3a" stroke-width="1"/>
    </svg>
    <button id="btn-start">開始</button>
    </div><!-- /metro-row -->

    <div class="strength-card" id="strength-card">
      <div class="mini-set-dots" id="mini-set-dots"></div>

      <!-- 重量設定（カウンター上） -->
      <div class="weight-control">
        <button class="weight-btn" id="btn-weight-down">◀</button>
        <div id="weight-display">20 kg</div>
        <button class="weight-btn" id="btn-weight-up">▶</button>
      </div>

      <!-- フェーズ名 -->
      <div id="strength-phase-label">スタート待ち</div>

      <div id="main-number">--</div>
      <div id="main-denom"></div>
      <div id="set-info">1セット目</div>
    </div>

    <!-- インターバル設定（赤枠の下） -->
    <div class="interval-row">
      <span class="interval-label">インターバル</span>
      <input type="range" id="slider-interval" min="30" max="180" step="5" value="60">
      <span id="interval-val">60秒</span>
    </div>
  </div>
</main>


<script>
// ===== CONSTANTS =====
const TEMPO         = 33;
const REPS_PER_MINI = 13;
const REST_BEATS    = 6;
const MINI_SETS     = 4;

// ===== STATE =====
const S = {
  running: false,
  phase: 'idle',
  miniSet: 1,
  repCount: 0,
  restCount: 0,
  setNum: 1,
  totalReps: 0,
  totalVolume: 0,
  nextBeatTime: 0,
  timer: null,
  intervalTimer: null,
  intervalEndTime: 0,
  displayTimer: null,
  weight: 20,
  interval: 60,
};

// ===== AUDIO =====
let _audioCtx = null;

function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function playTone(freq, dur, vol = 0.4) {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (_) {}
}

// ===== COUNTDOWN =====
const COUNTDOWN_FROM = 7;
let _cdTimer = null;
let _cdVal   = COUNTDOWN_FROM;

function playBeep() {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.5, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
    osc.start(); osc.stop(ctx.currentTime + 0.12);
  } catch (_) {}
}

function playBuzzer() {
  try {
    const ctx  = getAudioCtx();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth'; osc.frequency.value = 660;
    gain.gain.setValueAtTime(0.7, ctx.currentTime);
    gain.gain.setValueAtTime(0.7, ctx.currentTime + 0.55);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.75);
    osc.start(); osc.stop(ctx.currentTime + 0.75);
  } catch (_) {}
}

function showCountdown(n) {
  const overlay = document.getElementById('countdown-overlay');
  const numEl   = document.getElementById('countdown-num');
  // force re-trigger animation
  numEl.classList.remove('buzz');
  numEl.textContent = n;
  void numEl.offsetWidth;                // reflow
  numEl.classList.toggle('buzz', n === 0);
  overlay.classList.add('show');
}

function hideCountdown() {
  document.getElementById('countdown-overlay').classList.remove('show');
}

function startCountdown() {
  _cdVal = COUNTDOWN_FROM;
  S.phase = 'countdown';
  document.getElementById('btn-start').textContent = '停止';
  document.getElementById('btn-start').classList.add('stop');
  document.getElementById('bench-phase-label').textContent = '';
  updateMiniSetDots();
  tickCountdown();
}

function tickCountdown() {
  if (S.phase !== 'countdown') return;
  if (_cdVal > 0) {
    showCountdown(_cdVal);
    playBeep();
    _cdVal--;
    _cdTimer = setTimeout(tickCountdown, 1000);
  } else {
    // ブザーで開始
    showCountdown('GO');
    playBuzzer();
    _cdTimer = setTimeout(() => {
      hideCountdown();
      beginTraining();
    }, 800);
  }
}

function cancelCountdown() {
  clearTimeout(_cdTimer);
  _cdTimer = null;
  hideCountdown();
  S.phase = 'idle';
}

// ===== PENDULUM =====
function startPendulum() {
  const anim = document.getElementById('pendulum-anim');
  if (!anim) return;
  anim.setAttribute('dur', (2 * 60 / TEMPO).toFixed(3) + 's');
  try { anim.endElement(); } catch(e) {}
  anim.beginElement();
}

function stopPendulum() {
  const anim = document.getElementById('pendulum-anim');
  if (anim) try { anim.endElement(); } catch(e) {}
}

// ===== VIDEO CONTROL =====
// 動画(27秒・13回)をミニセット開始時に再生し、13回完了で停止
// playbackRate = 動画尺 ÷ 1ミニセット所要時間 で自動同期

function startRepVideo() {
  const video = document.getElementById('bench-video');
  if (!video.duration) return;
  // ビート1は即発火するため実再生時間は (REPS_PER_MINI - 1) インターバル分
  // playbackRate = 動画尺 ÷ 12インターバル で13回目のビートと動画末尾が一致する
  const miniSetDuration = (REPS_PER_MINI - 1) * (60 / TEMPO);  // 12 × 1.818 ≈ 21.8秒
  video.playbackRate = Math.min(video.duration / miniSetDuration, 15.9);
  video.currentTime  = 0;
  video.play().catch(() => {});
}

function pauseRepVideo() {
  const video = document.getElementById('bench-video');
  video.pause();
}

// ===== MINI SET DOTS =====
function buildMiniSetDots() {
  const container = document.getElementById('mini-set-dots');
  container.innerHTML = '';
  for (let i = 0; i < MINI_SETS; i++) {
    const dot = document.createElement('div');
    dot.className = 'mini-dot';
    dot.id = 'mini-dot-' + i;
    container.appendChild(dot);
  }
}

function updateMiniSetDots() {
  for (let i = 0; i < MINI_SETS; i++) {
    const dot = document.getElementById('mini-dot-' + i);
    if (!dot) continue;
    dot.classList.remove('done', 'current', 'rest', 'interval');
    if (S.phase === 'idle') {
      // all dark
    } else if (S.phase === 'interval') {
      if (i < S.miniSet - 1)      dot.classList.add('done');
      else if (i === S.miniSet - 1) dot.classList.add('current', 'interval');
    } else {
      const ci = S.miniSet - 1;
      if (i < ci)      dot.classList.add('done');
      else if (i === ci) {
        dot.classList.add('current');
        if (S.phase === 'rest') dot.classList.add('rest');
      }
    }
  }
}

// ===== MAIN NUMBER FLASH =====
let _flashTimer = null;
function flashMain() {
  const el = document.getElementById('main-number');
  el.classList.add('flash');
  if (_flashTimer) clearTimeout(_flashTimer);
  _flashTimer = setTimeout(() => el.classList.remove('flash'), 70);
}

// ===== UPDATE DISPLAY =====
function updateDisplay() {
  const card       = document.getElementById('strength-card');
  const mainNumber = document.getElementById('main-number');
  const mainDenom  = document.getElementById('main-denom');
  const setInfo    = document.getElementById('set-info');
  const benchLabel = document.getElementById('bench-phase-label');

  card.classList.remove('phase-rep', 'phase-rest', 'phase-interval');
  mainNumber.classList.remove('warning');
  if (S.phase === 'rep')      card.classList.add('phase-rep');
  if (S.phase === 'rest')     card.classList.add('phase-rest');
  if (S.phase === 'interval') card.classList.add('phase-interval');

  benchLabel.classList.remove('rest', 'interval', 'idle');
  if (S.phase === 'rep') {
    benchLabel.textContent = '';
  } else if (S.phase === 'rest') {
    benchLabel.textContent = '小休止';
    benchLabel.classList.add('rest');
  } else if (S.phase === 'interval') {
    benchLabel.textContent = 'インターバル';
    benchLabel.classList.add('interval');
  } else {
    benchLabel.textContent = 'スタート待ち';
    benchLabel.classList.add('idle');
  }

  const strengthLabel = document.getElementById('strength-phase-label');
  if (strengthLabel) {
    strengthLabel.classList.remove('rep', 'rest', 'interval');
    if (S.phase === 'rep') {
      strengthLabel.textContent = '筋トレ中';
      strengthLabel.classList.add('rep');
    } else if (S.phase === 'rest') {
      strengthLabel.textContent = '小休止';
      strengthLabel.classList.add('rest');
    } else if (S.phase === 'interval') {
      strengthLabel.textContent = 'インターバル';
      strengthLabel.classList.add('interval');
    } else if (S.phase === 'countdown') {
      strengthLabel.textContent = 'カウントダウン';
    } else {
      strengthLabel.textContent = 'スタート待ち';
    }
  }

  if (S.phase === 'rep') {
    mainNumber.textContent = S.repCount;
    mainDenom.textContent  = '/ ' + REPS_PER_MINI;
  } else if (S.phase === 'rest') {
    const remaining = REST_BEATS - S.restCount + 1;
    mainNumber.textContent = remaining;
    mainDenom.textContent  = '/ ' + REST_BEATS;
    if (remaining <= 3) mainNumber.classList.add('warning');
    else                mainNumber.classList.remove('warning');
  } else if (S.phase === 'interval') {
    const remaining = Math.max(0, Math.ceil((S.intervalEndTime - Date.now()) / 1000));
    mainNumber.textContent = remaining;
    mainDenom.textContent  = '秒';
  } else {
    mainNumber.textContent = '--';
    mainDenom.textContent  = '';
  }

  setInfo.textContent   = S.setNum + 'セット目';
  const vol = S.totalVolume.toLocaleString() + ' kg';
  document.getElementById('bench-volume-val').textContent = vol;
  updateMiniSetDots();
}

// ===== BEAT LOGIC =====
// セット構成: 13回rep → 6拍rest × 3回 → 13回rep → インターバル = 1セット
function onBeat() {
  if (S.phase === 'rep') {
    S.repCount++;
    S.totalReps++;
    S.totalVolume += S.weight;
    playTone(880, 0.06, 0.35);
    flashMain();
    updateDisplay(); // 13回目もちゃんと表示してからリセット

    if (S.repCount >= REPS_PER_MINI) {
      pauseRepVideo();
      S.repCount = 0;
      if (S.miniSet >= MINI_SETS) {
        startInterval(); // 内部でupdateDisplay呼ぶ
        return;
      }
      S.phase     = 'rest';
      S.restCount = 0;
      playTone(660, 0.2, 0.4);
      updateDisplay(); // 休憩フェーズ表示に切替
      return;
    }

  } else if (S.phase === 'rest') {
    S.restCount++;
    if (S.restCount >= REST_BEATS) {
      // 最終休憩拍：開始音のみ（休憩音と重ねない）
      S.miniSet++;
      S.phase     = 'rep';
      S.restCount = 0;
      startRepVideo();
      playTone(1100, 0.12, 0.5);
    } else {
      playTone(440, 0.06, 0.2);
    }
    updateDisplay();
  }
}

function tick() {
  if (!S.running) return;
  if (Date.now() >= S.nextBeatTime - 5) {
    onBeat();
    S.nextBeatTime += 60000 / TEMPO;
  }
  S.timer = setTimeout(tick, Math.max(1, Math.min(S.nextBeatTime - Date.now(), 16)));
}

// ===== INTERVAL =====
function startInterval() {
  S.phase = 'interval';
  clearTimeout(S.timer);
  S.intervalEndTime = Date.now() + S.interval * 1000;
  S.intervalTimer   = setTimeout(endInterval, S.interval * 1000);
  playTone(440, 0.4, 0.4);
  tickIntervalDisplay();
  updateDisplay();
}

function endInterval() {
  S.setNum++;
  S.miniSet   = 1;
  S.repCount  = 0;
  S.restCount = 0;
  S.phase     = 'rep';
  S.nextBeatTime = Date.now();
  startRepVideo();
  playTone(1100, 0.12, 0.5);
  tick();
  updateDisplay();
}

function tickIntervalDisplay() {
  if (S.phase !== 'interval') return;
  updateDisplay();
  S.displayTimer = setTimeout(tickIntervalDisplay, 500);
}

// ===== START / STOP =====
function beginTraining() {
  // カウントダウン終了後に呼ばれる実際のスタート
  S.running      = true;
  S.phase        = 'rep';
  S.miniSet      = 1;
  S.repCount     = 0;
  S.restCount    = 0;
  S.setNum       = 1;
  S.totalReps    = 0;
  S.totalVolume  = 0;
  S.nextBeatTime = Date.now();
  startRepVideo();
  startPendulum();
  updateDisplay();
  tick();
}

function stopTraining() {
  cancelCountdown();
  S.running = false;
  clearTimeout(S.timer);
  clearTimeout(S.intervalTimer);
  clearTimeout(S.displayTimer);
  pauseRepVideo();
  stopPendulum();
  S.timer = S.intervalTimer = S.displayTimer = null;
  S.phase = 'idle';

  const btn = document.getElementById('btn-start');
  btn.textContent = '開始';
  btn.classList.remove('stop');
  updateDisplay();
}

// ===== WEIGHT =====
function setWeight(w) {
  const clamped = Math.max(5, Math.min(90, Math.round(w / 5) * 5));
  S.weight = clamped;
  document.getElementById('weight-display').textContent = clamped + ' kg';
  updateDisplay();
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');
}

// ===== INIT =====
function init() {
  buildMiniSetDots();
  updateDisplay();
  updateClock();
  setInterval(updateClock, 1000);

  document.getElementById('btn-start').addEventListener('click', () => {
    getAudioCtx();
    if (S.running || S.phase === 'interval' || S.phase === 'countdown') {
      stopTraining();
    } else {
      startCountdown();
    }
  });

  const sliderInterval = document.getElementById('slider-interval');
  sliderInterval.addEventListener('input', () => {
    S.interval = parseInt(sliderInterval.value, 10);
    document.getElementById('interval-val').textContent = S.interval + '秒';
  });

  document.getElementById('btn-weight-down').addEventListener('click', () => setWeight(S.weight - 5));
  document.getElementById('btn-weight-up').addEventListener('click',   () => setWeight(S.weight + 5));

  document.getElementById('btn-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen().catch(() => {});
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
