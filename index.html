<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>サクラ整骨院 メトロノーム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080808; color: #fff;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 48px; padding: 40px;
    }
    h1 { font-size: clamp(1.4rem, 4vw, 2.8rem); font-weight: 800; color: #e8c4b8; letter-spacing: 0.06em; text-align: center; }
    .cards { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }
    .card {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      background: #0d0d0d; border: 1px solid #222; border-radius: 24px;
      padding: 40px 48px; text-decoration: none; color: #fff;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
      min-width: 220px;
    }
    .card:hover { transform: translateY(-4px); }
    .card.step  { border-color: #1a3a1a; }
    .card.step:hover  { border-color: #22C55E; box-shadow: 0 0 60px rgba(34,197,94,0.15); }
    .card.strength { border-color: #3a1a1a; }
    .card.strength:hover { border-color: #EF4444; box-shadow: 0 0 60px rgba(239,68,68,0.15); }
    .card-icon { font-size: 3.5rem; }
    .card-title { font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 900; letter-spacing: 0.08em; }
    .card-desc  { font-size: clamp(0.75rem, 1.8vw, 1rem); color: #555; text-align: center; line-height: 1.6; }
    .card.step  .card-title { color: #22C55E; }
    .card.strength .card-title { color: #EF4444; }
  </style>
</head>
<body>
  <h1>サクラ整骨院<br>メトロノーム</h1>
  <div class="cards">
    <a class="card step" href="./step.html">
      <div class="card-icon">🚶</div>
      <div class="card-title">ステップ</div>
      <div class="card-desc">ウォーキング用<br>75→105 / 85→115 BPM</div>
    </a>
    <a class="card strength" href="./strength.html">
      <div class="card-icon">💪</div>
      <div class="card-title">筋トレ</div>
      <div class="card-desc">低重量トレーニング<br>33 BPM / 13回×4セット</div>
    </a>
  </div>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
